<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SAT Vocab">
<meta name="theme-color" content="#131F24">
<title>SAT Vocab</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js" onerror="window._noFB=true"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js" onerror="window._noFB=true"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:#131F24;color:#fff;max-width:480px;margin:0 auto;display:flex;flex-direction:column;height:100dvh}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none}
.btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:800;color:#fff;text-transform:uppercase;margin-bottom:10px}
.btn:active{transform:translateY(2px);box-shadow:none}
input{font-family:inherit;background:#1B2B31;color:#fff;border:2px solid #2a4a52;border-radius:12px;padding:12px 16px;font-size:16px;width:100%;outline:none}
input:focus{border-color:#58CC02}
</style>
</head>
<body>
<div id="app" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:18px;font-weight:800;color:#58CC02">Loading...</div>
<script>
// Firebase
let db=null;
try{if(typeof firebase!=="undefined"&&!window._noFB){firebase.initializeApp({apiKey:"AIzaSyCLC23aASA2NFK1eUdrECWz0D9Qojgl_vg",authDomain:"sat-vocab-4bbe0.firebaseapp.com",projectId:"sat-vocab-4bbe0",storageBucket:"sat-vocab-4bbe0.firebasestorage.app",messagingSenderId:"1080222913619",appId:"1:1080222913619:web:af440bb9f134f7e46822a6"});db=firebase.firestore();}}catch(e){}

// UUID
function genUUID(){try{return crypto.randomUUID();}catch(e){return 'xxxx-xxxx-xxxx'.replace(/x/g,()=>(0|Math.random()*16).toString(16));}}

// Data
const UNITS=[
  {name:"Basics 1",words:[["abase","v.","to humiliate, degrade","The leader was abased before his conqueror."],["abate","v.","to reduce, lessen","The storm raged, then slowly abated."],["abdicate","v.","to give up a position of leadership","The king abdicated his throne."],["aberration","n.","something that differs from the norm","The warm day was an aberration."],["abet","v.","to aid, help, encourage","A friend on the inside abetted the spy."]]},
  {name:"Basics 2",words:[["abhor","v.","to hate, detest","She began to abhor the sport."],["abject","adj.","wretched, pitiful","After losing everything, she was abject."],["abjure","v.","to reject, renounce","He abjured the evil policies."],["abridge","v.","to cut down, shorten","The publisher abridged the dictionary."],["abrogate","v.","to abolish, usually by authority","They cannot abrogate our rights."]]},
  {name:"Intermediate",words:[["abscond","v.","to sneak away and hide","The spy absconded into the night."],["abstain","v.","to choose not to do something","He abstained from voting."],["abstruse","adj.","hard to comprehend","John found geometry abstruse."],["accede","v.","to agree","The teacher acceded to their request."],["accentuate","v.","to stress, highlight","Happy people accentuate the positive."]]},
  {name:"Advanced",words:[["acclaim","n.","high praise","Her poem won widespread acclaim."],["accolade","n.","high praise, special distinction","He received accolades for his work."],["acerbic","adj.","biting, bitter in tone","Her acerbic remarks hurt everyone."],["acquiesce","v.","to agree without protesting","He acquiesced to her demands."],["acrimony","n.","bitterness, discord","Acrimony overwhelmed their friendship."]]},
];
const ALL=UNITS.flatMap(u=>u.words);
const PATH=[
  {type:"learn",unit:0,icon:"\u2B50",name:"Basics 1"},{type:"review",icon:"\uD83D\uDD04",name:"Review 1"},
  {type:"learn",unit:1,icon:"\uD83D\uDCDA",name:"Basics 2"},{type:"review",icon:"\uD83D\uDD04",name:"Review 2"},
  {type:"learn",unit:2,icon:"\uD83D\uDD25",name:"Intermediate"},{type:"review",icon:"\uD83D\uDD04",name:"Review 3"},
  {type:"learn",unit:3,icon:"\uD83D\uDC8E",name:"Advanced"},
];

// HLR
function calcHL(nc,nw,ph){return Math.max(0.25,Math.pow(2,0.7+0.9*Math.sqrt(nc)-0.7*Math.sqrt(nw)+0.35*Math.log2(ph+1)));}
function recallP(h,d){return h>0?Math.pow(2,-d/h):0;}
function todayNum(){return Math.floor(Date.now()/86400000);}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function makeOpts(gi){const d=[];const u=new Set([gi]);while(d.length<3){const r=0|Math.random()*ALL.length;if(!u.has(r)){u.add(r);d.push(r);}}return shuffle([gi,...d]);}
function rclr(v){return v>0.8?"#58CC02":v>0.5?"#ffd54f":"#FF4B4B";}

// State
const SK="sat-vocab-pwa-v2";
function defaultState(){return{uid:"",name:"",np:[1,0,0,0,0,0,0],ws:ALL.map((_,i)=>({i,nc:0,nw:0,h:0,lp:0,seen:false})),xp:0,str:0,gems:50,ld:0,txp:0};}
let S=defaultState();
let screen="path",curNode=0,exs=[],exi=0,hearts=5,picked=null,isOk=null,lc=0,lw=0,missed=[],leaderboard=[],editingName=false,recoverUsers=[];
const dailyGoal=50,today=todayNum();
const G="#58CC02",R="#FF4B4B",CB="#1B2B31",BC="#2a4a52",BL="#1CB0F6";

// Storage
function saveLocal(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}
function loadLocal(){try{const d=localStorage.getItem(SK);if(d){const p=JSON.parse(d);if(p.uid){S=p;return true;}}}catch(e){}return false;}

async function saveCloud(){
  if(!db||!S.uid)return;
  try{
    await db.collection("users").doc(S.uid).set({
      uid:S.uid,name:S.name,np:S.np,ws:S.ws,xp:S.xp,str:S.str,gems:S.gems,ld:S.ld,txp:S.txp
    });
    await db.collection("leaderboard").doc(S.uid).set({
      uid:S.uid,name:S.name,xp:S.xp,streak:S.str,
      words:S.ws.filter(w=>w.seen).length,gems:S.gems,updated:Date.now()
    });
  }catch(e){}
}

async function loadCloud(uid){
  if(!db)return false;
  try{
    const doc=await db.collection("users").doc(uid).get();
    if(doc.exists){
      const d=doc.data();
      if(d.np)S.np=d.np;if(d.ws)S.ws=d.ws;if(d.xp!=null)S.xp=d.xp;
      if(d.str!=null)S.str=d.str;if(d.gems!=null)S.gems=d.gems;
      if(d.ld)S.ld=d.ld;if(d.txp!=null)S.txp=d.txp;
      if(d.name)S.name=d.name;S.uid=uid;
      return true;
    }
  }catch(e){}
  return false;
}

async function loadLeaderboard(){
  if(!db){leaderboard=[];return;}
  try{const snap=await db.collection("leaderboard").orderBy("xp","desc").limit(50).get();leaderboard=[];snap.forEach(doc=>leaderboard.push(doc.data()));}catch(e){}
}

function saveAll(){saveLocal();saveCloud();}

// Helpers
function getWeakWords(u){const mx=(u+1)*5;return S.ws.filter((w,i)=>i<mx&&w.seen&&(w.nw>0||recallP(w.h,today-w.lp)<0.8));}
function reviewHasWords(ni){return getWeakWords(Math.floor(ni/2)).length>0;}
function buildLearn(ui){const b=ui*5,e=[];for(let i=0;i<5;i++)e.push({type:"intro",gi:b+i});for(const i of shuffle([0,1,2,3,4]))e.push({type:"pickDef",gi:b+i,opts:makeOpts(b+i)});for(const i of shuffle([0,1,2,3,4]))e.push({type:"pickWord",gi:b+i,opts:makeOpts(b+i)});return e;}
function buildReview(ni){const w=getWeakWords(Math.floor(ni/2));if(!w.length)return[];const b=shuffle(w).slice(0,10),e=[];for(const x of shuffle(b))e.push({type:"pickDef",gi:x.i,opts:makeOpts(x.i)});for(const x of shuffle(b))e.push({type:"pickWord",gi:x.i,opts:makeOpts(x.i)});return e;}
function completeNode(ni){S.np[ni]=2;if(ni+1<S.np.length&&S.np[ni+1]===0)S.np[ni+1]=1;}

// ══════════ RENDER ══════════
function render(){
  const isNew=S.ld<today,gp=Math.min(100,((isNew?0:S.txp)/dailyGoal)*100),gm=S.txp>=dailyGoal&&!isNew;
  let h="";

  // ═══ RECOVER (restore existing account) ═══
  if(screen==="recover"){
    h+=`<div style="flex:1;display:flex;flex-direction:column;padding:24px;overflow:hidden">
      <div style="font-size:24px;font-weight:900;margin-bottom:16px;text-align:center">👋 Welcome Back</div>
      <div style="font-size:12px;color:#8BA4AE;margin-bottom:12px;text-align:center">Found your existing accounts. Select one to restore:</div>
      <div style="flex:1;overflow-y:auto;margin-bottom:16px">`;
    recoverUsers.forEach((u,i)=>{
      h+=`<button onclick="window.doRecover('${u.uid}')" style="width:100%;background:${CB};border:2px solid ${BC};border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer" onmouseover="this.style.borderColor='${G}'" onmouseout="this.style.borderColor='${BC}'">
        <div style="flex:1;text-align:left">
          <div style="font-size:16px;font-weight:900;color:#fff">${u.name}</div>
          <div style="font-size:11px;color:#8BA4AE">${u.words||0} words · \uD83D\uDD25${u.streak||0}d</div>
        </div>
        <div style="text-align:right;color:#ffd54f;font-weight:900;font-size:14px">${u.xp}</div>
      </button>`;
    });
    h+=`</div>
      <div style="width:100%">
        <button class="btn" style="background:${CB};color:#8BA4AE;box-shadow:0 4px 0 #0d1a20;margin-bottom:0" onclick="screen='setup';render()">Create New Account</button>
      </div>
    </div>`;
  }

  // ═══ SETUP (first time) ═══
  if(screen==="setup"){
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
      <div style="font-size:48px;margin-bottom:12px">\uD83D\uDCDA</div>
      <div style="font-size:24px;font-weight:900;color:${G};margin-bottom:6px">SAT Vocab</div>
      <div style="font-size:13px;color:#8BA4AE;margin-bottom:30px">HLR spaced repetition</div>
      <div id="setup-content" style="width:100%">
        <div style="font-size:13px;color:#8BA4AE;margin-bottom:8px;font-weight:700">What should we call you?</div>
        <input id="ni" placeholder="Your display name" style="margin-bottom:16px;text-align:center" maxlength="20">
        <button class="btn" style="background:${G};box-shadow:0 4px 0 #45A000" onclick="submitName()">Start Learning</button>
        <div style="margin-top:16px;font-size:11px;color:#5a7a84">\u2601\uFE0F Progress syncs to cloud<br>You can change your name anytime</div>
      </div>
    </div>`;
  }

  // ═══ RENAME ═══
  if(screen==="rename"){
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
      <div style="font-size:48px;margin-bottom:12px">\u270F\uFE0F</div>
      <div style="font-size:20px;font-weight:900;margin-bottom:4px">Change Display Name</div>
      <div style="font-size:13px;color:#8BA4AE;margin-bottom:20px">Current: ${S.name}</div>
      <input id="rni" placeholder="New display name" value="${S.name}" style="margin-bottom:16px;text-align:center" maxlength="20">
      <button class="btn" style="background:${G};box-shadow:0 4px 0 #45A000" onclick="doRename()">Save Name</button>
      <button class="btn" style="background:${CB};color:#8BA4AE;box-shadow:0 4px 0 #0d1a20" onclick="screen='path';render()">Cancel</button>
    </div>`;
  }

  // ═══ MIGRATE (device transfer) ═══
  if(screen==="migrate"){
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
      <div style="font-size:48px;margin-bottom:12px">\uD83D\uDCF1</div>
      <div style="font-size:20px;font-weight:900;margin-bottom:6px">Device Transfer</div>
      <div style="font-size:12px;color:#8BA4AE;margin-bottom:20px;line-height:1.5">To transfer your progress to another device, copy the code below and paste it on the new device.</div>
      <div style="font-size:11px;color:#8BA4AE;margin-bottom:6px;font-weight:700">Your transfer code:</div>
      <div id="tc" style="background:${CB};border:1px solid ${BC};border-radius:10px;padding:12px;font-size:11px;color:${G};word-break:break-all;margin-bottom:10px;font-family:monospace">${S.uid}</div>
      <button class="btn" style="background:${BL};box-shadow:0 4px 0 #1390C8" onclick="copyUID()">Copy Code</button>
      <div id="cm" style="font-size:11px;color:${G};margin-bottom:16px"></div>
      <div style="width:100%;height:1px;background:${BC};margin:8px 0 16px"></div>
      <div style="font-size:12px;color:#8BA4AE;margin-bottom:8px;font-weight:700">Restore from another device:</div>
      <input id="ri" placeholder="Paste transfer code here" style="margin-bottom:10px;text-align:center;font-size:13px">
      <button class="btn" style="background:${G};box-shadow:0 4px 0 #45A000" onclick="doMigrate()">Restore</button>
      <div id="rm" style="font-size:11px;margin-bottom:10px"></div>
      <button class="btn" style="background:${CB};color:#8BA4AE;box-shadow:0 4px 0 #0d1a20" onclick="screen='path';render()">Back</button>
    </div>`;
  }

  // ═══ PATH ═══
  if(screen==="path"){
    const seenN=S.ws.filter(w=>w.seen).length;
    h+=`<div style="flex:1;display:flex;flex-direction:column;overflow:hidden">`;
    // Header
    h+=`<div style="padding:12px 16px;border-bottom:1px solid ${BC}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:18px;font-weight:900;color:${G}">SAT Vocab</span>
        <div style="display:flex;gap:5px">
          <span style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;background:${CB};color:#ff7043">\uD83D\uDD25${S.str}</span>
          <span style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;background:${CB};color:#ffd54f">\u26A1${S.xp}</span>
          <span style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;background:${CB};color:${BL}">\uD83D\uDC8E${S.gems}</span>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:2px">
        <span style="font-size:10px;font-weight:700;color:#8BA4AE">Daily Goal</span>
        <span style="font-size:10px;font-weight:700;color:${gm?G:"#8BA4AE"}">${gm?"\u2705":(isNew?0:S.txp)+"/"+dailyGoal}</span>
      </div>
      <div style="height:6px;background:#1e3040;border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;width:${gp}%;background:${gm?G:"#ffd54f"};transition:width 0.5s"></div></div>
      <div style="margin-top:4px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:10px;color:#5a7a84">${seenN}/${ALL.length} words</span>
        <button onclick="screen='rename';render()" style="font-size:10px;color:${BL};background:none;border:none;font-weight:700">${S.name} \u270F\uFE0F</button>
      </div>
    </div>`;

    // Scrollable
    h+=`<div style="flex:1;overflow-y:auto;padding:16px 18px;-webkit-overflow-scrolling:touch">`;

    // Path nodes - show completed + current + next locked
    h+=`<div style="display:flex;flex-direction:column;align-items:center">`;
    let shownLocked=0;
    PATH.forEach((node,ni)=>{
      const st=S.np[ni],locked=st===0,done=st===2,avail=st===1;
      const isRev=node.type==="review",hasWork=isRev&&avail&&reviewHasWords(ni),noWork=isRev&&avail&&!reviewHasWords(ni);
      if(locked){if(shownLocked>0)return;shownLocked++;}
      const sz=avail?72:done?56:48;
      if(ni>0)h+=`<div style="width:3px;height:${isRev?10:16}px;background:${done||avail?"${G}":"#2a3a42"};border-radius:2px;margin-bottom:3px"></div>`;
      const borderC=(avail&&(!isRev||hasWork))?(isRev?BL:G):done||noWork?G:"#2a3a42";
      const bg=done||noWork?G:avail?CB:"#1a2530";
      const shadow=avail&&(!isRev||hasWork)?"0 5px 0 "+(isRev?"#1390C8":"#45A000"):done||noWork?"0 3px 0 #45A000":"none";
      const icon=done||noWork?"\u2705":isRev&&hasWork?"\uD83D\uDD04":node.icon;
      h+=`<button onclick="startNode(${ni})" ${locked?"disabled":""} style="width:${sz}px;height:${sz}px;border-radius:50%;border:4px solid ${borderC};background:${bg};box-shadow:${shadow};opacity:${locked?0.3:1};display:flex;align-items:center;justify-content:center;position:relative">
        <span style="font-size:${avail?24:done?18:16}px">${icon}</span>
        ${avail&&!noWork?`<div style="position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);background:${isRev?BL:G};color:#fff;font-size:7px;font-weight:800;padding:2px 7px;border-radius:7px">${isRev?"REVIEW":"START"}</div>`:""}
      </button>`;
      h+=`<div style="margin-top:6px;text-align:center;margin-bottom:4px"><div style="font-size:11px;font-weight:800;color:${locked?"#5a6a72":"#fff"}">${node.name}</div>`;
      if(node.type==="learn"&&done){const b=node.unit*5;h+=`<div style="display:flex;gap:3px;justify-content:center;margin-top:2px">`;S.ws.slice(b,b+5).forEach(w=>{h+=`<div style="width:6px;height:6px;border-radius:3px;background:${rclr(recallP(w.h,today-w.lp))}"></div>`;});h+=`</div>`;}
      if(isRev&&hasWork)h+=`<div style="font-size:9px;color:${BL};font-weight:700">${getWeakWords(Math.floor(ni/2)).length} weak</div>`;
      if(isRev&&(done||noWork))h+=`<div style="font-size:9px;color:${G};font-weight:700">All strong</div>`;
      if(locked)h+=`<div style="font-size:9px;color:#5a6a72">\uD83D\uDD12</div>`;
      h+=`</div>`;
    });
    h+=`</div>`;

    // Memory
    const seen=S.ws.filter(w=>w.seen);
    if(seen.length>0){
      h+=`<div style="margin-top:20px;padding:10px 12px;background:${CB};border-radius:12px;border:1px solid ${BC}"><div style="font-size:10px;font-weight:700;color:${G};margin-bottom:6px">Memory Tracker</div>`;
      seen.forEach(w=>{const p=recallP(w.h,today-w.lp);h+=`<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px"><span style="font-size:10px;font-weight:700;width:65px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ALL[w.i][0]}</span><div style="flex:1;height:6px;background:#1e3040;border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;width:${Math.round(p*100)}%;background:${rclr(p)}"></div></div><span style="font-size:8px;font-weight:700;color:${rclr(p)};width:24px;text-align:right">${Math.round(p*100)}%</span></div>`;});
      h+=`</div>`;
    }
    h+=`</div>`;

    // Bottom tabs
    h+=`<div style="display:flex;border-top:1px solid ${BC};flex-shrink:0;padding:6px 0 max(6px,env(safe-area-inset-bottom))">
      <button onclick="goPath()" style="flex:1;background:none;border:none;text-align:center;padding:4px 0"><div style="font-size:18px">\uD83C\uDFE0</div><div style="font-size:9px;font-weight:700;color:${G}">Home</div></button>
      <button onclick="showLeaderboard()" style="flex:1;background:none;border:none;text-align:center;padding:4px 0"><div style="font-size:18px">\uD83C\uDFC6</div><div style="font-size:9px;font-weight:700;color:#8BA4AE">Rankings</div></button>
      <button onclick="screen='profile';editingName=false;render()" style="flex:1;background:none;border:none;text-align:center;padding:4px 0"><div style="font-size:18px">\uD83D\uDC64</div><div style="font-size:9px;font-weight:700;color:#8BA4AE">Profile</div></button>
      <button onclick="screen='migrate';render()" style="flex:1;background:none;border:none;text-align:center;padding:4px 0"><div style="font-size:18px">\uD83D\uDCF1</div><div style="font-size:9px;font-weight:700;color:#8BA4AE">Transfer</div></button>
    </div>`;
    h+=`</div>`;
  }

  // ═══ PROFILE ═══
  if(screen==="profile"){
    h+=`<div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div style="padding:12px 16px;border-bottom:1px solid ${BC}">
        <div style="font-size:20px;font-weight:900">\uD83D\uDC64 Profile</div>
      </div>
      <div style="flex:1;overflow-y:auto;padding:16px 18px;-webkit-overflow-scrolling:touch">
        <div style="background:${CB};border:2px solid ${BC};border-radius:16px;padding:20px;margin-bottom:16px">
          <div style="font-size:12px;color:#8BA4AE;font-weight:700;margin-bottom:8px">DISPLAY NAME</div>`;
    if(!editingName){
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="font-size:24px;font-weight:900">${S.name}</div>
        <button class="btn" style="background:${BL};box-shadow:0 4px 0 #1390C8;width:auto;padding:8px 14px;font-size:12px;margin:0;font-weight:700" onclick="editingName=true;render()">Edit</button>
      </div>`;
    }else{
      h+=`<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">
        <input type="text" id="pni" value="${S.name}" placeholder="Enter name" maxlength="20" style="font-size:16px">
        <div style="display:flex;gap:8px">
          <button class="btn" style="background:${G};box-shadow:0 4px 0 #45A000;flex:1;margin:0;font-weight:700" onclick="window.saveProfileName()">Save</button>
          <button class="btn" style="background:${CB};color:#8BA4AE;box-shadow:0 4px 0 #0d1a20;flex:1;margin:0;font-weight:700" onclick="editingName=false;render()">Cancel</button>
        </div>
      </div>`;
    }
    h+=`</div>
      <div style="background:${CB};border:2px solid ${BC};border-radius:16px;padding:20px;margin-bottom:16px">
        <div style="font-size:12px;color:#8BA4AE;font-weight:700;margin-bottom:12px">STATISTICS</div>
        <div style="display:flex;justify-content:space-around;margin-bottom:12px">
          <div style="text-align:center"><div style="font-size:24px;font-weight:900;color:#ffd54f">${S.xp}</div><div style="font-size:10px;color:#8BA4AE;font-weight:700;margin-top:4px">Total XP</div></div>
          <div style="text-align:center"><div style="font-size:24px;font-weight:900;color:#ff7043">\uD83D\uDD25${S.str}</div><div style="font-size:10px;color:#8BA4AE;font-weight:700;margin-top:4px">Streak</div></div>
          <div style="text-align:center"><div style="font-size:24px;font-weight:900;color:${G}">${S.ws.filter(w=>w.seen).length}</div><div style="font-size:10px;color:#8BA4AE;font-weight:700;margin-top:4px">Words</div></div>
        </div>
      </div>
      <div style="background:${CB};border:2px solid ${BC};border-radius:16px;padding:20px">
        <div style="font-size:12px;color:#8BA4AE;font-weight:700;margin-bottom:8px">USER ID</div>
        <div style="background:#0d1a20;border-radius:10px;padding:12px;border:1px solid ${BC};margin-bottom:10px;word-break:break-all;font-size:12px;font-weight:700;color:#58CC02;font-family:monospace">${S.uid}</div>
        <button class="btn" style="background:${BL};box-shadow:0 4px 0 #1390C8;font-size:12px" onclick="window.copyUID()" id="cp">\uD83D\uDC4B Copy ID</button>
      </div>
    </div>
    <div style="display:flex;border-top:1px solid ${BC};flex-shrink:0;padding:6px 0 max(6px,env(safe-area-inset-bottom))">
      <button onclick="goPath()" style="flex:1;background:none;border:none;text-align:center;padding:4px 0"><div style="font-size:18px">\uD83C\uDFE0</div><div style="font-size:9px;font-weight:700;color:#8BA4AE">Home</div></button>
      <button onclick="showLeaderboard()" style="flex:1;background:none;border:none;text-align:center;padding:4px 0"><div style="font-size:18px">\uD83C\uDFC6</div><div style="font-size:9px;font-weight:700;color:#8BA4AE">Rankings</div></button>
      <button onclick="screen='profile';editingName=false;render()" style="flex:1;background:none;border:none;text-align:center;padding:4px 0"><div style="font-size:18px">\uD83D\uDC64</div><div style="font-size:9px;font-weight:700;color:${G}">Profile</div></button>
      <button onclick="screen='migrate';render()" style="flex:1;background:none;border:none;text-align:center;padding:4px 0"><div style="font-size:18px">\uD83D\uDCF1</div><div style="font-size:9px;font-weight:700;color:#8BA4AE">Transfer</div></button>
    </div>
    </div>`;
  }

  // ═══ LEADERBOARD ═══
  if(screen==="leaderboard"){
    h+=`<div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div style="padding:12px 18px;border-bottom:1px solid ${BC};display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
        <button onclick="goPath()" style="background:none;border:none;color:#8BA4AE;font-size:16px">\u2190</button>
        <span style="font-size:18px;font-weight:900">\uD83C\uDFC6 Rankings</span>
        <button onclick="showLeaderboard()" style="background:none;border:none;color:#8BA4AE;font-size:14px">\u21BB</button>
      </div><div style="flex:1;overflow-y:auto;padding:12px 18px">`;
    if(!leaderboard.length)h+=`<div style="text-align:center;color:#5a7a84;padding:40px 0">Loading...</div>`;
    else leaderboard.forEach((p,i)=>{
      const me=p.uid===S.uid,m=["\uD83E\uDD47","\uD83E\uDD48","\uD83E\uDD49"];
      h+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${me?"#1a3a2a":CB};border-radius:12px;margin-bottom:6px;border:${me?"2px solid "+G:"1px solid "+BC}">
        <span style="font-size:${i<3?18:13}px;font-weight:900;width:28px;text-align:center">${i<3?m[i]:i+1}</span>
        <div style="flex:1"><div style="font-size:13px;font-weight:800;color:${me?G:"#fff"}">${p.name||"???"}${me?" (you)":""}</div><div style="font-size:10px;color:#5a7a84">${p.words||0} words \u00B7 \uD83D\uDD25${p.streak||0}d</div></div>
        <div style="text-align:right"><div style="font-size:15px;font-weight:900;color:#ffd54f">${p.xp||0}</div><div style="font-size:8px;color:#5a7a84">XP</div></div>
      </div>`;
    });
    h+=`</div>`;
    h+=`<div style="display:flex;border-top:1px solid ${BC};flex-shrink:0;padding:6px 0 max(6px,env(safe-area-inset-bottom))">
      <button onclick="goPath()" style="flex:1;background:none;border:none;text-align:center;padding:4px 0"><div style="font-size:18px">\uD83C\uDFE0</div><div style="font-size:9px;font-weight:700;color:#8BA4AE">Home</div></button>
      <button onclick="showLeaderboard()" style="flex:1;background:none;border:none;text-align:center;padding:4px 0"><div style="font-size:18px">\uD83C\uDFC6</div><div style="font-size:9px;font-weight:700;color:${G}">Rankings</div></button>
      <button onclick="screen='migrate';render()" style="flex:1;background:none;border:none;text-align:center;padding:4px 0"><div style="font-size:18px">\uD83D\uDCF1</div><div style="font-size:9px;font-weight:700;color:#8BA4AE">Transfer</div></button>
    </div></div>`;
  }

  // ═══ LESSON ═══
  if(screen==="lesson"&&exs[exi]){
    const ex=exs[exi],word=ALL[ex.gi],isRev=PATH[curNode].type==="review",prog=((exi+1)/exs.length)*100;
    h+=`<div style="flex:1;display:flex;flex-direction:column;overflow:hidden">`;
    h+=`<div style="padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0">
      <button onclick="goPath()" style="background:none;border:none;color:#8BA4AE;font-size:20px;padding:4px 8px">\u2715</button>
      <div style="flex:1;height:12px;background:#2a3a42;border-radius:6px;overflow:hidden"><div style="height:100%;border-radius:6px;width:${prog}%;background:${isRev?BL:G};transition:width 0.4s"></div></div>
      <div style="display:flex;gap:1px">${[0,1,2,3,4].map(i=>`<span style="font-size:14px;opacity:${i<hearts?1:0.15}">\u2764\uFE0F</span>`).join("")}</div>
    </div>`;
    if(isRev&&ex.type!=="intro"&&S.ws[ex.gi].seen){const p=recallP(S.ws[ex.gi].h,today-S.ws[ex.gi].lp);h+=`<div style="text-align:center;padding:0 16px 4px;font-size:11px;color:#5a7a84">Memory: <span style="font-weight:800;color:${rclr(p)}">${Math.round(p*100)}%</span></div>`;}
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow-y:auto">`;

    if(ex.type==="intro"){
      h+=`<div style="width:100%;text-align:center"><div style="font-size:13px;color:#8BA4AE;font-weight:700;margin-bottom:10px">New Word</div>
        <div style="background:${CB};border:2px solid ${BC};border-radius:16px;padding:22px 18px;margin-bottom:14px">
          <div style="font-size:32px;font-weight:900;margin-bottom:2px">${word[0]}</div>
          <div style="font-size:12px;color:${G};font-weight:700;margin-bottom:12px">${word[1]}</div>
          <div style="font-size:16px;color:#c8e0e8;line-height:1.5;padding-top:12px;border-top:1px solid ${BC}">${word[2]}</div>
          <div style="margin-top:12px;padding:8px 12px;background:#162228;border-radius:8px;border-left:3px solid ${G}">
            <div style="font-size:8px;color:${G};font-weight:700;margin-bottom:2px">EXAMPLE</div>
            <div style="font-size:12px;color:#9ab8c4;font-style:italic">${word[3]}</div></div>
        </div><button class="btn" style="background:${G};box-shadow:0 4px 0 #45A000" onclick="handleNext()">Got it</button></div>`;
    }
    if(ex.type==="pickDef"||ex.type==="pickWord"){
      const isDef=ex.type==="pickDef";
      h+=`<div style="width:100%;text-align:center"><div style="font-size:13px;color:#8BA4AE;font-weight:700;margin-bottom:10px">${isDef?"What does this word mean?":"Which word matches?"}</div>
        <div style="background:${CB};border:2px solid ${BC};border-radius:16px;padding:20px 16px;margin-bottom:14px">
          ${isDef?`<div style="font-size:28px;font-weight:900">${word[0]}</div><div style="font-size:11px;color:${G};font-weight:700">${word[1]}</div>`:`<div style="font-size:15px;color:#c8e0e8;line-height:1.5">${word[2]}</div>`}
        </div><div style="display:flex;flex-direction:column;gap:7px">`;
      ex.opts.forEach(oi=>{
        let s=`padding:12px 14px;border:2px solid ${BC};border-radius:12px;background:${CB};color:#c8e0e8;font-size:${isDef?"13":"16"}px;font-weight:${isDef?"600":"800"};text-align:left;width:100%;opacity:1`;
        if(picked!==null){if(oi===ex.gi)s=s.replace(BC,G).replace(CB,"#1a3a1a").replace("#c8e0e8",G);else if(oi===picked)s=s.replace(BC,R).replace(CB,"#3a1a1a").replace("#c8e0e8",R);else s+=";opacity:0.3";}
        h+=`<button style="${s}" onclick="handlePick(${oi})" ${picked!==null?"disabled":""}>${isDef?ALL[oi][2]:ALL[oi][0]}</button>`;
      });
      h+=`</div>`;
      if(picked!==null){
        h+=`<div style="margin-top:12px;width:100%">
          <div style="padding:10px 14px;border-radius:10px;margin-bottom:10px;background:${isOk?"#1a3a1a":"#3a1a1a"};border:1px solid ${isOk?G:R}">
            <div style="font-size:14px;font-weight:800;color:${isOk?G:R}">${isOk?"\u2705 Correct!":"\u274C Wrong"}</div>
            ${!isOk?`<div style="font-size:11px;color:#8BA4AE;margin-top:3px">${isDef?word[2]:word[0]+" \u2014 "+word[2]}</div>`:""}
          </div><button class="btn" style="background:${isOk?G:R};box-shadow:0 4px 0 ${isOk?"#45A000":"#cc3030"}" onclick="handleNext()">Continue</button></div>`;
      }
      h+=`</div>`;
    }
    h+=`</div></div>`;
  }

  // ═══ COMPLETE ═══
  if(screen==="complete"){
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
      <div style="font-size:56px;margin-bottom:10px">\uD83C\uDF89</div>
      <div style="font-size:22px;font-weight:900;margin-bottom:4px">${PATH[curNode].type==="review"?"Review Done!":"Lesson Done!"}</div>`;
    if(S.str>0)h+=`<div style="padding:6px 16px;background:linear-gradient(135deg,#3a2000,#2a1500);border-radius:12px;border:1px solid #5a3000;margin:10px 0;display:flex;align-items:center;gap:6px"><span style="font-size:24px">\uD83D\uDD25</span><span style="font-size:16px;font-weight:900;color:#ff7043">${S.str}d streak!</span></div>`;
    h+=`<div style="display:flex;gap:20px;margin:16px 0">
      <div style="text-align:center"><div style="font-size:24px;font-weight:900;color:#ffd54f">${lc*10}</div><div style="font-size:9px;color:#8BA4AE">XP</div></div>
      <div style="text-align:center"><div style="font-size:24px;font-weight:900;color:${G}">${lc}</div><div style="font-size:9px;color:#8BA4AE">CORRECT</div></div>
      <div style="text-align:center"><div style="font-size:24px;font-weight:900;color:${R}">${lw}</div><div style="font-size:9px;color:#8BA4AE">WRONG</div></div>
    </div>
    <button class="btn" style="background:${G};box-shadow:0 4px 0 #45A000" onclick="goPath()">Continue</button></div>`;
  }

  // ═══ FAIL ═══
  if(screen==="fail"){
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
      <div style="font-size:56px;margin-bottom:10px">\uD83D\uDC94</div>
      <div style="font-size:22px;font-weight:900;margin-bottom:4px;color:${R}">Out of Hearts!</div>
      <div style="font-size:12px;color:#8BA4AE;margin-bottom:14px">${lc} correct, ${lw} wrong</div>
      <div style="width:100%;margin-bottom:14px">`;
    [...new Set(missed)].forEach(gi=>{const w=S.ws[gi],p=recallP(w.h,today-w.lp);
      h+=`<div style="display:flex;align-items:center;gap:6px;padding:6px 10px;background:${CB};border-radius:8px;margin-bottom:3px;border:1px solid ${BC}"><span style="font-weight:800;font-size:11px;width:65px">${ALL[gi][0]}</span><div style="flex:1;height:5px;background:#1e3040;border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;width:${Math.round(p*100)}%;background:${rclr(p)}"></div></div><span style="font-size:8px;font-weight:700;color:${rclr(p)}">${Math.round(p*100)}%</span></div>`;
    });
    h+=`</div><button class="btn" style="background:${BL};box-shadow:0 4px 0 #1390C8" onclick="startNode(${curNode})">Try Again</button><button class="btn" style="background:${CB};color:#8BA4AE;box-shadow:0 4px 0 #0d1a20" onclick="goPath()">Back</button></div>`;
  }

  document.getElementById("app").innerHTML=h;
}

// ══════════ ACTIONS ══════════
window.submitName=async function(){
  const v=document.getElementById("ni").value.trim();
  if(!v)return;
  S.name=v;
  
  // 检查云端是否有同名用户，自动恢复进度最高的
  if(db){
    try{
      const snap=await db.collection("users").where("name","==",v).get();
      if(!snap.empty){
        let bestUser=null;
        let maxXP=-1;
        snap.forEach(doc=>{
          const data=doc.data();
          if(data.xp&&data.xp>maxXP){
            maxXP=data.xp;
            bestUser=data;
          }
        });
        if(bestUser){
          S.uid=bestUser.uid;
          S.np=bestUser.np||S.np;
          S.ws=bestUser.ws||S.ws;
          S.xp=bestUser.xp;
          S.str=bestUser.str!=null?bestUser.str:S.str;
          S.gems=bestUser.gems!=null?bestUser.gems:S.gems;
          S.ld=bestUser.ld||S.ld;
          S.txp=bestUser.txp!=null?bestUser.txp:S.txp;
          saveLocal();
          screen="path";
          render();
          return;
        }
      }
    }catch(e){}
  }
  
  // 没找到同名用户，创建新用户
  S.uid=genUUID();
  saveAll();screen="path";render();
};
window.doRecover=async function(uid){
  if(!db)return;
  try{
    const doc=await db.collection("users").doc(uid).get();
    if(doc.exists){
      const d=doc.data();
      S.uid=uid;
      S.name=d.name||S.name;
      S.np=d.np||S.np;
      S.ws=d.ws||S.ws;
      S.xp=d.xp!=null?d.xp:S.xp;
      S.str=d.str!=null?d.str:S.str;
      S.gems=d.gems!=null?d.gems:S.gems;
      S.ld=d.ld||S.ld;
      S.txp=d.txp!=null?d.txp:S.txp;
      saveLocal();
      screen="path";
      render();
    }
  }catch(e){}
};
window.doRename=function(){
  const v=document.getElementById("rni").value.trim();
  if(!v)return;
  S.name=v;saveAll();screen="path";render();
};
window.copyUID=function(){
  const btn=document.getElementById("cp")||document.getElementById("cm");
  const origText=btn.textContent;
  navigator.clipboard.writeText(S.uid).then(()=>{btn.textContent="\u2705 Copied!";setTimeout(()=>{btn.textContent=origText;},2000);}).catch(()=>{
    const t=document.createElement("textarea");t.value=S.uid;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);
    btn.textContent="\u2705 Copied!";setTimeout(()=>{btn.textContent=origText;},2000);
  });
};
window.saveProfileName=function(){
  const v=document.getElementById("pni").value.trim();
  if(!v)return;
  S.name=v;
  editingName=false;
  saveAll();
  render();
};
window.doMigrate=async function(){
  const uid=document.getElementById("ri").value.trim();
  if(!uid){document.getElementById("rm").innerHTML=`<span style="color:${R}">Please paste a transfer code</span>`;return;}
  if(db){
    const ok=await loadCloud(uid);
    if(ok){S.uid=uid;saveLocal();document.getElementById("rm").innerHTML=`<span style="color:${G}">\u2705 Restored! Welcome back ${S.name}!</span>`;setTimeout(()=>{screen="path";render();},1500);}
    else{document.getElementById("rm").innerHTML=`<span style="color:${R}">\u274C Code not found in cloud</span>`;}
  }else{document.getElementById("rm").innerHTML=`<span style="color:${R}">\u274C No internet connection</span>`;}
};
window.goPath=function(){screen="path";render();};
window.startNode=function(ni){if(S.np[ni]===0)return;curNode=ni;if(PATH[ni].type==="learn")exs=buildLearn(PATH[ni].unit);else{exs=buildReview(ni);if(!exs.length){completeNode(ni);saveAll();screen="path";render();return;}}exi=0;hearts=5;picked=null;isOk=null;lc=0;lw=0;missed=[];screen="lesson";render();};
window.handlePick=function(o){if(picked!==null)return;const ex=exs[exi],ok=o===ex.gi;picked=o;isOk=ok;const w=S.ws[ex.gi];if(ok){w.nc++;lc++;S.xp+=10;}else{w.nw++;lw++;hearts--;missed.push(ex.gi);}w.h=calcHL(w.nc,w.nw,w.h);w.lp=today;w.seen=true;saveAll();render();};
window.handleNext=function(){if(hearts<=0&&!isOk){screen="fail";render();return;}if(exi+1>=exs.length){const u=[...new Set(missed)];if(u.length>0){const r=[];for(const gi of shuffle(u))r.push({type:Math.random()>0.5?"pickDef":"pickWord",gi,opts:makeOpts(gi)});exs=exs.concat(r);missed=[];exi++;picked=null;isOk=null;render();return;}S.gems+=5;const e=lc*10;if(S.ld<today){S.str=S.ld===today-1?S.str+1:(S.ld===0?1:1);S.ld=today;S.txp=e;}else S.txp+=e;completeNode(curNode);saveAll();screen="complete";render();}else{exi++;picked=null;isOk=null;render();}};
window.showLeaderboard=async function(){screen="leaderboard";render();await loadLeaderboard();render();};

// ══════════ INIT ══════════
(async()=>{
  const loaded=loadLocal();
  if(S.ld>0&&S.ld<today-1)S.str=0;
  if(S.ld<today)S.txp=0;
  if(!S.uid){
    // 检查云端是否有现存账户
    if(db){
      try{
        const snap=await db.collection("leaderboard").orderBy("xp","desc").limit(100).get();
        const users=[];
        snap.forEach(doc=>{
          const d=doc.data();
          if(d.uid&&d.name&&d.xp>0)users.push(d);
        });
        if(users.length>0){
          // 显示恢复界面
          screen="recover";
          recoverUsers=users.slice(0,20);
          render();
          return;
        }
      }catch(e){}
    }
    screen="setup";
    render();
    return;
  }
  // Try cloud sync
  if(db&&S.uid){
    try{const d=await db.collection("users").doc(S.uid).get();
      if(d.exists){const c=d.data();if(c.xp!=null&&c.xp>S.xp){S.np=c.np||S.np;S.ws=c.ws||S.ws;S.xp=c.xp;S.str=c.str!=null?c.str:S.str;S.gems=c.gems!=null?c.gems:S.gems;S.ld=c.ld||S.ld;S.txp=c.txp!=null?c.txp:S.txp;if(c.name)S.name=c.name;}}
    }catch(e){}
    if(S.ld>0&&S.ld<today-1)S.str=0;
    if(S.ld<today)S.txp=0;
  }
  saveLocal();render();
})();
</script>
