// HLR
function calcHL(nc,nw,ph){return Math.max(0.25,Math.pow(2,0.7+0.9*Math.sqrt(nc)-0.7*Math.sqrt(nw)+0.35*Math.log2(ph+1)));}
function recallP(h,d){return h>0?Math.pow(2,-d/h):0;}
function todayNum(){return Math.floor(Date.now()/86400000);}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function makeOpts(gi){const ui=unitIndexOf(gi);const unitStart=UNIT_START[ui];const unitLen=UNITS[ui].words.length;const d=[];const u=new Set([gi]);let guard=0;while(d.length<3&&guard<50){guard++;const r=unitStart+(0|Math.random()*unitLen);if(!u.has(r)){u.add(r);d.push(r);}}while(d.length<3){const r=0|Math.random()*ALL.length;if(!u.has(r)){u.add(r);d.push(r);}}return shuffle([gi,...d]);}
function isMulti(gi){return Array.isArray(ALL[gi][3]);}

function speak(word){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(word);

function makeMultiOpts(gi){const correctDefs=ALL[gi][3];const ui2=unitIndexOf(gi);const unitStart=UNIT_START[ui2];const unitLen2=UNITS[ui2].words.length;const wrongDefs=[];const u=new Set([gi]);let guard2=0;while(wrongDefs.length<2&&guard2<50){guard2++;const r=unitStart+(0|Math.random()*unitLen2);if(!u.has(r)&&!isMulti(r)){u.add(r);wrongDefs.push(ALL[r][3]);}}while(wrongDefs.length<2){const r=0|Math.random()*ALL.length;if(!u.has(r)&&!isMulti(r)){u.add(r);wrongDefs.push(ALL[r][3]);}}const opts=[...correctDefs.map(d=>({text:d,correct:true})),...wrongDefs.map(d=>({text:d,correct:false}))];return shuffle(opts);}

function buildLearnFromWords(wordNames){
  const exs=[];
  const wordMap={};
  FULL_VOCAB.forEach(w=>{wordMap[w[0]]=w;});
  const words=wordNames.map(w=>wordMap[w]);
  
  // intro 环节
  words.forEach(w=>{exs.push({type:"intro",word:w});});
  
  // 定义选择
  shuffle(words).forEach(w=>{
    if(Array.isArray(w[2])){
      exs.push({type:"pickMulti",word:w,mopts:shuffle([...w[2]].map((d,i)=>({text:d,correct:true})))});
    }else{
      const wrongDefs=[];
      while(wrongDefs.length<3){
        const r=FULL_VOCAB[Math.random()*FULL_VOCAB.length|0];
        if(r[0]!==w[0]&&!Array.isArray(r[2])){
          wrongDefs.push(r[2]);
        }
      }
      exs.push({type:"pickDef",word:w,opts:shuffle([w[2],...wrongDefs])});
    }
  });
  
  // 单词选择
  shuffle(words).forEach(w=>{
    const wrongWords=[];
    while(wrongWords.length<3){
      const r=FULL_VOCAB[Math.random()*FULL_VOCAB.length|0];
      if(r[0]!==w[0]){
        wrongWords.push(r[0]);
      }
    }
    exs.push({type:"pickWord",word:w,opts:shuffle([w[0],...wrongWords])});
  });
  
  return exs;
}

function migrateState(){
  // 兼容旧格式：ws数组 → wp对象
  // 条件：有ws数组 且 wp为空（Object.keys=0 或 不存在）
  if(Array.isArray(S.ws)&&(!S.wp||Object.keys(S.wp).length===0)){

    delete S.ws;
  }
  if(!S.wp)S.wp={};
  // 重建运行时ws数组
  buildWs();
  // 扩展np到PATH长度
  if(!S.np)S.np=[];
  while(S.np.length<PATH.length)S.np.push(0);
  // 修复：已完成节点后面若锁定则解锁（旧用户完成原终点后新内容被锁）
  for(let i=0;i<S.np.length-1;i++){if(S.np[i]===2&&S.np[i+1]===0)S.np[i+1]=1;}
}

async function saveCloud(retries){
  if(retries==null)retries=2;
  if(!db||!S.uid||S.uid==="undefined"||S.uid==="")return;
  syncWp();
  for(let attempt=0;attempt<=retries;attempt++){
    try{
      // 添加10秒超时
      const timeoutPromise=new Promise((resolve,reject)=>
        setTimeout(()=>reject(new Error("timeout")),10000)
      );
      
      const savePromise=Promise.all([
        db.collection("users").doc(S.uid).set({
          uid:S.uid,name:S.name,np:S.np,wp:S.wp,xp:S.xp,str:S.str,gems:S.gems,ld:S.ld,txp:S.txp
        }),
        db.collection("leaderboard").doc(S.uid).set({
          uid:S.uid,name:S.name,xp:S.xp,streak:S.str,
          words:S.ws.filter(w=>w.seen).length,gems:S.gems,updated:Date.now()
        })
      ]);
      
      await Promise.race([savePromise,timeoutPromise]);
      return;  // 成功，直接返回
    }catch(e){
      if(attempt<retries){
        // 失败后退避重试：1秒、2秒
        await new Promise(r=>setTimeout(r,1000*(attempt+1)));
      }else{
        console.log("Cloud save failed after "+(retries+1)+" attempts:",e.message);
      }
    }
  }
}

async function loadCloud(uid){

      // 兼容旧格式ws和新格式wp

      if(d.name)S.name=d.name;S.uid=uid;

    }
  }catch(e){}

}

async function loadLeaderboard(){

function reviewHasWords(ni){return getWeakWords(Math.floor(ni/2)).length>0;}
function buildLearn(ui){const b=UNIT_START[ui];const n=UNITS[ui].words.length;const idx=Array.from({length:n},(_,i)=>i);const e=[];for(let i=0;i<n;i++)e.push({type:"intro",gi:b+i});for(const i of shuffle(idx)){const gi=b+i;if(isMulti(gi))e.push({type:"pickMulti",gi,mopts:makeMultiOpts(gi)});else e.push({type:"pickDef",gi,opts:makeOpts(gi)});}for(const i of shuffle(idx))e.push({type:"pickWord",gi:b+i,opts:makeOpts(b+i)});return e;}
function buildReview(ni){const w=getWeakWords(Math.floor(ni/2));if(!w.length)return[];
  // 按记忆强度从低到高排序：最容易被遗忘的词优先安排复习（而非随机抽取）
  const sorted=[...w].sort((x,y)=>recallP(x.h,today-x.lp)-recallP(y.h,today-y.lp));
  const b=sorted.slice(0,10),e=[];for(const x of shuffle(b)){if(isMulti(x.i))e.push({type:"pickMulti",gi:x.i,mopts:makeMultiOpts(x.i)});else e.push({type:"pickDef",gi:x.i,opts:makeOpts(x.i)});}for(const x of shuffle(b))e.push({type:"pickWord",gi:x.i,opts:makeOpts(x.i)});return e;}
function completeNode(ni){
  S.np[ni]=2;
  // 标记这个unit的词为已学过
  curUnitWords.forEach(wordName=>{
    if(!S.wp[wordName])S.wp[wordName]={nc:0,nw:0,h:0,lp:0,seen:false};
    S.wp[wordName].seen=true;
  });
  // 如果是 learn node，今日新词数 += 完成的词数（重置由XP代码负责）
  if(PATH[ni].type==="learn"){
    S.tnw=(S.tnw||0)+curUnitWords.length;
  }
  if(ni+1<S.np.length&&S.np[ni+1]===0)S.np[ni+1]=1;
}

    h+=`<div style="display:flex;gap:20px;margin:16px 0">

  }
}

window.submitName=async function(){
  const v=document.getElementById("ni").value.trim();
  if(!v)return;
  S.name=v;
  
  // 显示加载状态
  const btn=event?.target;
  if(btn){
    btn.disabled=true;
    btn.textContent="Loading...";
  }
  
  // 设置最大超时（3秒必须完成）
  const maxTimeout=new Promise((resolve)=>
    setTimeout(()=>resolve("timeout"),3000)
  );
  
  // 检查云端是否有同名用户，自动恢复进度最高的
  const cloudCheckPromise=(async()=>{
    if(!db)return "no-db";
    try{
      const timeoutPromise=new Promise((resolve,reject)=>
        setTimeout(()=>reject(new Error("timeout")),5000)
      );
      const queryPromise=db.collection("users").where("name","==",v).get();
      const snap=await Promise.race([queryPromise,timeoutPromise]);
      
      if(!snap.empty){
        let bestUser=null;
        let bestDoc=null;
        let maxXP=-1;
        snap.forEach(doc=>{
          const data=doc.data();
          if(data.xp&&data.xp>maxXP){
            maxXP=data.xp;
            bestUser=data;
            bestDoc=doc;
          }
        });
        if(bestUser&&bestDoc){
          S.uid=bestDoc.id;
          S.np=bestUser.np||S.np;
          if(bestUser.wp)S.wp=bestUser.wp;else if(bestUser.ws)S.ws=bestUser.ws;
          S.xp=bestUser.xp;
          S.str=bestUser.str!=null?bestUser.str:S.str;
          S.gems=bestUser.gems!=null?bestUser.gems:S.gems;
          S.ld=bestUser.ld||S.ld;
          S.txp=bestUser.txp!=null?bestUser.txp:S.txp;
          migrateState();
          saveLocal();
          // 异步保存到云端，不等待
          saveCloud().catch(e=>console.log("Background cloud save failed"));
          return "found-user";
        }
      }
      return "no-user";
    }catch(e){
      console.log("Cloud check failed");
      return "error";
    }
  })();
  
  // 等待云端检查完成或超时
  const result=await Promise.race([cloudCheckPromise,maxTimeout]);
  
  // 如果没找到现存用户，创建新用户
  if(result!=="found-user"){
    S.uid=genUUID();
    buildWs();  // 初始化S.ws
    saveLocal();
    // 异步保存到云端，不等待
    saveCloud().catch(e=>console.log("Background cloud save failed"));
  }
  
  // 无论如何都要跳转
  screen="path";
  try{
    render();
  }catch(e){
    console.log("Render error",e);
    // 即使render出错，也要显示应用
    document.getElementById("app").innerHTML="<div>✓ Ready to learn!</div>";
  }
};
window.doRecover=async function(uid){
  if(!db||!uid||uid==="undefined")return;
  try{
    const timeoutPromise=new Promise((resolve,reject)=>
      setTimeout(()=>reject(new Error("timeout")),5000)
    );
    const docPromise=db.collection("users").doc(uid).get();
    const doc=await Promise.race([docPromise,timeoutPromise]);
    if(doc.exists){
      const d=doc.data();
      S.uid=uid;
      S.name=d.name||S.name;
      S.np=d.np||S.np;
      if(d.wp)S.wp=d.wp;else if(d.ws)S.ws=d.ws;
      S.xp=d.xp!=null?d.xp:S.xp;
      S.str=d.str!=null?d.str:S.str;
      S.gems=d.gems!=null?d.gems:S.gems;
      S.ld=d.ld||S.ld;
      S.txp=d.txp!=null?d.txp:S.txp;
      migrateState();
      saveLocal();
      screen="path";
      render();
    }
  }catch(e){console.log("doRecover error:",e);}
};

window.startNode=function(ni){if(S.np[ni]===0)return;curNode=ni;if(PATH[ni].type==="learn"){const u=PATH[ni].unit;const n=UNITS[u].words.length;curUnitWords=Array.from({length:n},(_,i)=>ALL[UNIT_START[u]+i][0]);exs=buildLearn(u);}else{exs=buildReview(ni);if(!exs.length){completeNode(ni);saveAll();screen="path";render();return;}}exi=0;hearts=5;picked=null;isOk=null;lc=0;lw=0;missed=[];multiSel=[];screen="lesson";render();};
window.handlePick=function(o){if(picked!==null)return;const ex=exs[exi],ok=o===ex.gi;picked=o;isOk=ok;const w=S.ws[ex.gi];if(ok){w.nc++;lc++;S.xp+=10;}else{w.nw++;lw++;hearts--;missed.push(ex.gi);}w.h=calcHL(w.nc,w.nw,w.h);w.lp=today;w.seen=true;saveAll();render();};
window.toggleMulti=function(oi){if(picked!==null)return;if(multiSel.includes(oi))multiSel=multiSel.filter(x=>x!==oi);else multiSel.push(oi);render();};
window.submitMulti=function(){if(picked!==null||multiSel.length===0)return;const ex=exs[exi],mopts=ex.mopts;const correctIdx=mopts.map((o,i)=>o.correct?i:-1).filter(i=>i>=0);const allCorrect=correctIdx.every(i=>multiSel.includes(i));const noWrong=multiSel.every(i=>mopts[i].correct);const ok=allCorrect&&noWrong;picked=1;isOk=ok;const w=S.ws[ex.gi];if(ok){w.nc++;lc++;S.xp+=10;}else{w.nw++;lw++;hearts--;missed.push(ex.gi);}w.h=calcHL(w.nc,w.nw,w.h);w.lp=today;w.seen=true;saveAll();render();};
window.handleNext=function(){if(hearts<=0&&!isOk){screen="fail";render();return;}multiSel=[];if(exi+1>=exs.length){const u=[...new Set(missed)];if(u.length>0){const r=[];for(const gi of shuffle(u)){if(isMulti(gi))r.push({type:"pickMulti",gi,mopts:makeMultiOpts(gi)});else r.push({type:Math.random()>0.5?"pickDef":"pickWord",gi,opts:makeOpts(gi)});}exs=exs.concat(r);missed=[];exi++;picked=null;isOk=null;render();return;}S.gems+=5;const e=lc*10;if(S.ld<today){S.str=S.ld===today-1?S.str+1:(S.ld===0?1:1);S.ld=today;S.txp=e;S.tnw=0;}else S.txp+=e;completeNode(curNode);saveAll();screen="complete";render();}else{exi++;picked=null;isOk=null;render();}};

window.loadBackups=async function(){
  if(!db||!S.uid){

    return;
  }
  try{
    // 添加5秒超时
    const timeoutPromise=new Promise((resolve,reject)=>
      setTimeout(()=>reject(new Error("timeout")),5000)
    );
    const queryPromise=db.collection("users").doc(S.uid)
      .collection("backups").orderBy("date","desc").get();
    const snap=await Promise.race([queryPromise,timeoutPromise]);
    
    if(snap.empty){
      document.getElementById("backupList").innerHTML=`<span style="color:#8BA4AE">No backups found</span>`;
      return;
    }
    let html=``;
    snap.forEach(doc=>{
      const d=doc.data();
      const date=new Date(d.date+"T00:00:00");
      const dateStr=date.toLocaleDateString();
      const xp=d.xp||0;
      const words=d.wp?Object.keys(d.wp).filter(k=>d.wp[k].seen).length:0;
      html+=`<div style="background:${CB};border:1px solid ${BC};border-radius:12px;padding:12px;margin-bottom:10px">

          <button class="btn" style="background:${G};box-shadow:0 3px 0 #45A000;width:auto;padding:6px 12px;font-size:11px;margin:0" onclick="window.restoreBackup('${d.date}')">Restore</button>
        </div>
        <div style="font-size:11px;color:#8BA4AE">
          ${xp} XP · ${words} words learned
        </div>
      </div>`;
    });

  }catch(e){
    document.getElementById("backupList").innerHTML=`<span style="color:${R}">Failed to load backups (${e.message})</span>`;
    console.log("Load backups error",e);
  }

};

// ══════════ BACKUP ══════════
const BK_SK="sat-backup-date";
async function saveBackup(){
  if(!db||!S.uid||S.uid.length<10)return;
  try{
    const dateStr=new Date().toISOString().slice(0,10); // YYYY-MM-DD
    syncWp();
    
    // 添加10秒超时
    const timeoutPromise=new Promise((resolve,reject)=>
      setTimeout(()=>reject(new Error("timeout")),10000)
    );
    
    const backupPromise=(async()=>{
      // 保存到 users/{uid}/backups/{date}
      await db.collection("users").doc(S.uid)
        .collection("backups").doc(dateStr).set({
          date:dateStr, uid:S.uid, name:S.name,
          np:S.np, wp:S.wp, xp:S.xp, str:S.str,
          gems:S.gems, ld:S.ld, txp:S.txp,
          savedAt:Date.now()
        });
      // 清理7天前的备份
      const cutoff=new Date();
      cutoff.setDate(cutoff.getDate()-7);
      const cutoffStr=cutoff.toISOString().slice(0,10);
      const old=await db.collection("users").doc(S.uid)
        .collection("backups").where("date","<",cutoffStr).get();
      const batch=db.batch();
      old.forEach(doc=>batch.delete(doc.ref));
      if(!old.empty)await batch.commit();
    })();
    
    await Promise.race([backupPromise,timeoutPromise]);
    // 记录本次备份日期
    localStorage.setItem(BK_SK,dateStr);
  }catch(e){console.log("backup failed (timeout or error)",e);}
}

// ── 自动更新检测（无需用户点击，检测到新版本直接自动刷新）──
async function checkForUpdates(){
  try{
    const resp=await fetch(location.href+'?bust='+Date.now(),{cache:'no-store'});
    const text=await resp.text();
    const m=text.match(/APP_VERSION\s*=\s*"([^"]+)"/);
    if(m&&m[1]!==APP_VERSION){
      showUpdatingToast(m[1]);
      setTimeout(()=>location.reload(true),900);  // 短暂提示后自动刷新
    }
  }catch(e){}
}
function showUpdatingToast(newVer){
  if(document.getElementById('updateBanner'))return;
  const b=document.createElement('div');
  b.id='updateBanner';
  b.style.cssText='position:fixed;top:0;left:0;right:0;background:#58CC02;color:#fff;'+
    'padding:14px 16px;text-align:center;z-index:9999;font-size:14px;font-weight:700;'+
    'box-shadow:0 2px 8px rgba(0,0,0,.3);';
  b.textContent='🆕 正在更新到 v'+newVer+' ...';
  document.body.prepend(b);
}
