<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SAT Vocab">
<meta name="theme-color" content="#131F24">
<title>SAT Vocab</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js" onerror="window._noFB=true"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js" onerror="window._noFB=true"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--g:#58CC02;--g2:#45A000;--bg:#131F24;--cb:#1B2B31;--bc:#2a4a52;--red:#FF4B4B;--blue:#1CB0F6;--gold:#ffd54f;--fire:#ff7043;--txt:#fff;--sub:#8BA4AE;--dim:#5a7a84}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:var(--bg);color:var(--txt);max-width:480px;margin:0 auto;display:flex;flex-direction:column;height:100dvh}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none}
.btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:800;color:#fff;text-transform:uppercase;margin-bottom:10px}
.btn:active{transform:translateY(2px);box-shadow:none}
.btn-g{background:var(--g);box-shadow:0 4px 0 var(--g2)}
.btn-red{background:var(--red);box-shadow:0 4px 0 #cc3030}
.btn-blue{background:var(--blue);box-shadow:0 4px 0 #1390C8}
.btn-dark{background:var(--cb);color:var(--sub);box-shadow:0 4px 0 #0d1a20}
input{font-family:inherit;background:var(--cb);color:var(--txt);border:2px solid var(--bc);border-radius:12px;padding:12px 16px;font-size:16px;width:100%;outline:none}
input:focus{border-color:var(--g)}
</style>
</head>
<body>
<div id="app" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:18px;font-weight:800;color:var(--g)">Loading...</div>
<script>
let db=null;
try{if(typeof firebase!=="undefined"&&!window._noFB){firebase.initializeApp({apiKey:"AIzaSyCLC23aASA2NFK1eUdrECWz0D9Qojgl_vg",authDomain:"sat-vocab-4bbe0.firebaseapp.com",projectId:"sat-vocab-4bbe0",storageBucket:"sat-vocab-4bbe0.firebasestorage.app",messagingSenderId:"1080222913619",appId:"1:1080222913619:web:af440bb9f134f7e46822a6"});db=firebase.firestore();}}catch(e){}

const UNITS=[
  {name:"Basics 1",words:[["abase","v.","to humiliate, degrade","The leader was abased before his conqueror."],["abate","v.","to reduce, lessen","The storm raged, then slowly abated."],["abdicate","v.","to give up a position of leadership","The king abdicated his throne."],["aberration","n.","something that differs from the norm","The warm day was an aberration."],["abet","v.","to aid, help, encourage","A friend on the inside abetted the spy."]]},
  {name:"Basics 2",words:[["abhor","v.","to hate, detest","She began to abhor the sport."],["abject","adj.","wretched, pitiful","After losing everything, she was abject."],["abjure","v.","to reject, renounce","He abjured the evil policies."],["abridge","v.","to cut down, shorten","The publisher abridged the dictionary."],["abrogate","v.","to abolish, usually by authority","They cannot abrogate our rights."]]},
  {name:"Intermediate",words:[["abscond","v.","to sneak away and hide","The spy absconded into the night."],["abstain","v.","to choose not to do something","He abstained from voting."],["abstruse","adj.","hard to comprehend","John found geometry abstruse."],["accede","v.","to agree","The teacher acceded to their request."],["accentuate","v.","to stress, highlight","Happy people accentuate the positive."]]},
  {name:"Advanced",words:[["acclaim","n.","high praise","Her poem won widespread acclaim."],["accolade","n.","high praise, special distinction","He received accolades for his work."],["acerbic","adj.","biting, bitter in tone","Her acerbic remarks hurt everyone."],["acquiesce","v.","to agree without protesting","He acquiesced to her demands."],["acrimony","n.","bitterness, discord","Acrimony overwhelmed their friendship."]]},
];
const ALL=UNITS.flatMap(u=>u.words);
const PATH=[
  {type:"learn",unit:0,icon:"\u2B50",name:"Basics 1"},{type:"review",icon:"\uD83D\uDD04",name:"Review 1"},
  {type:"learn",unit:1,icon:"\uD83D\uDCDA",name:"Basics 2"},{type:"review",icon:"\uD83D\uDD04",name:"Review 2"},
  {type:"learn",unit:2,icon:"\uD83D\uDD25",name:"Intermediate"},{type:"review",icon:"\uD83D\uDD04",name:"Review 3"},
  {type:"learn",unit:3,icon:"\uD83D\uDC8E",name:"Advanced"},
];

function calcHL(nc,nw,ph){return Math.max(0.25,Math.pow(2,0.7+0.9*Math.sqrt(nc)-0.7*Math.sqrt(nw)+0.35*Math.log2(ph+1)));}
function recallP(h,d){return h>0?Math.pow(2,-d/h):0;}
function todayNum(){return Math.floor(Date.now()/86400000);}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function makeOpts(gi){const d=[];const u=new Set([gi]);while(d.length<3){const r=0|Math.random()*ALL.length;if(!u.has(r)){u.add(r);d.push(r);}}return shuffle([gi,...d]);}
function rclr(v){return v>0.8?"#58CC02":v>0.5?"#ffd54f":"#FF4B4B";}

const SK="sat-vocab-pwa-v1";
let S={np:[1,0,0,0,0,0,0],ws:ALL.map((_,i)=>({i,nc:0,nw:0,h:0,lp:0,seen:false})),xp:0,str:0,gems:50,ld:0,txp:0,name:""};
let screen="path",curNode=0,exs=[],exi=0,hearts=5,picked=null,isOk=null,lc=0,lw=0,missed=[],leaderboard=[];
const dailyGoal=50,today=todayNum();

function saveLocal(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}
function loadLocal(){try{const d=localStorage.getItem(SK);if(d){S=JSON.parse(d);return true;}}catch(e){}return false;}
async function saveCloud(){if(!db||!S.name)return;try{await db.collection("users").doc(S.name).set(S);await db.collection("leaderboard").doc(S.name).set({name:S.name,xp:S.xp,streak:S.str,words:S.ws.filter(w=>w.seen).length,gems:S.gems,updated:Date.now()});}catch(e){}}
async function loadCloud(name){if(!db)return false;try{const doc=await db.collection("users").doc(name).get();if(doc.exists){const d=doc.data();if(d.np)S.np=d.np;if(d.ws)S.ws=d.ws;if(d.xp!=null)S.xp=d.xp;if(d.str!=null)S.str=d.str;if(d.gems!=null)S.gems=d.gems;if(d.ld)S.ld=d.ld;if(d.txp!=null)S.txp=d.txp;S.name=name;return true;}}catch(e){}return false;}
async function loadLeaderboard(){if(!db){leaderboard=[];return;}try{const snap=await db.collection("leaderboard").orderBy("xp","desc").limit(50).get();leaderboard=[];snap.forEach(doc=>leaderboard.push(doc.data()));}catch(e){}}
function saveAll(){saveLocal();saveCloud();}

loadLocal();
if(S.ld>0&&S.ld<today-1)S.str=0;
if(S.ld<today)S.txp=0;
if(!S.name)screen="setup";

function getWeakWords(u){const mx=(u+1)*5;return S.ws.filter((w,i)=>i<mx&&w.seen&&(w.nw>0||recallP(w.h,today-w.lp)<0.8));}
function reviewHasWords(ni){return getWeakWords(Math.floor(ni/2)).length>0;}
function buildLearn(ui){const b=ui*5,e=[];for(let i=0;i<5;i++)e.push({type:"intro",gi:b+i});for(const i of shuffle([0,1,2,3,4]))e.push({type:"pickDef",gi:b+i,opts:makeOpts(b+i)});for(const i of shuffle([0,1,2,3,4]))e.push({type:"pickWord",gi:b+i,opts:makeOpts(b+i)});return e;}
function buildReview(ni){const w=getWeakWords(Math.floor(ni/2));if(!w.length)return[];const b=shuffle(w).slice(0,10),e=[];for(const x of shuffle(b))e.push({type:"pickDef",gi:x.i,opts:makeOpts(x.i)});for(const x of shuffle(b))e.push({type:"pickWord",gi:x.i,opts:makeOpts(x.i)});return e;}
function completeNode(ni){S.np[ni]=2;if(ni+1<S.np.length&&S.np[ni+1]===0)S.np[ni+1]=1;}

// ══════════ RENDER ══════════
function render(){
  const isNew=S.ld<today,gp=Math.min(100,((isNew?0:S.txp)/dailyGoal)*100),gm=S.txp>=dailyGoal&&!isNew;
  let h="";

  // ═══ SETUP ═══
  if(screen==="setup"){
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
      <div style="font-size:48px;margin-bottom:12px">\uD83D\uDCDA</div>
      <div style="font-size:24px;font-weight:900;color:var(--g);margin-bottom:6px">SAT Vocab</div>
      <div style="font-size:13px;color:var(--sub);margin-bottom:30px">HLR spaced repetition</div>
      <div style="font-size:13px;color:var(--sub);margin-bottom:8px;font-weight:700">Your name:</div>
      <input id="ni" placeholder="Enter name" style="margin-bottom:16px;text-align:center" maxlength="20">
      <button class="btn btn-g" onclick="submitName()">Start</button>
      <div style="margin-top:16px;font-size:11px;color:var(--dim)">\u2601\uFE0F Progress syncs to cloud</div>
    </div>`;
  }

  // ═══ PATH ═══
  if(screen==="path"){
    const seenN=S.ws.filter(w=>w.seen).length;
    h+=`<div style="flex:1;display:flex;flex-direction:column;overflow:hidden">`;

    // Header
    h+=`<div style="padding:12px 16px;border-bottom:1px solid var(--bc)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:18px;font-weight:900;color:var(--g)">SAT Vocab</span>
        <div style="display:flex;gap:5px">
          <span style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;background:var(--cb);color:var(--fire)">\uD83D\uDD25${S.str}</span>
          <span style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;background:var(--cb);color:var(--gold)">\u26A1${S.xp}</span>
          <span style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;background:var(--cb);color:var(--blue)">\uD83D\uDC8E${S.gems}</span>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:2px">
        <span style="font-size:10px;font-weight:700;color:var(--sub)">Daily Goal</span>
        <span style="font-size:10px;font-weight:700;color:${gm?"var(--g)":"var(--sub)"}">${gm?"\u2705":(isNew?0:S.txp)+"/"+dailyGoal}</span>
      </div>
      <div style="height:6px;background:#1e3040;border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;width:${gp}%;background:${gm?"var(--g)":"var(--gold)"};transition:width 0.5s"></div></div>
      <div style="margin-top:4px;font-size:10px;color:var(--dim)">${S.name} \u00B7 ${seenN}/${ALL.length} words</div>
    </div>`;

    // Scrollable content
    h+=`<div style="flex:1;overflow-y:auto;padding:16px 18px;-webkit-overflow-scrolling:touch">`;

    // Path - only show completed + current + next 1 locked
    h+=`<div style="display:flex;flex-direction:column;align-items:center">`;
    let shown=0;
    PATH.forEach((node,ni)=>{
      const st=S.np[ni],locked=st===0,done=st===2,avail=st===1;
      const isRev=node.type==="review",hasWork=isRev&&avail&&reviewHasWords(ni),noWork=isRev&&avail&&!reviewHasWords(ni);

      // Only show: done nodes, available nodes, first locked node after available
      if(locked&&!avail){
        // Show only one locked node as preview
        if(shown>0)return; // already showed one locked
        shown++;
      }

      const sz=avail?72:done?60:50;
      if(ni>0&&(done||avail||shown<=1))h+=`<div style="width:3px;height:${isRev?12:18}px;background:${done||avail?"var(--g)":"#2a3a42"};border-radius:2px;margin-bottom:3px"></div>`;

      const borderC=(avail&&(!isRev||hasWork))?(isRev?"var(--blue)":"var(--g)"):done||noWork?"var(--g)":"#2a3a42";
      const bg=done||noWork?"var(--g)":avail?"var(--cb)":"#1a2530";
      const shadow=avail&&(!isRev||hasWork)?"0 5px 0 "+(isRev?"#1390C8":"var(--g2)"):done||noWork?"0 3px 0 var(--g2)":"none";
      const icon=done||noWork?"\u2705":isRev&&hasWork?"\uD83D\uDD04":node.icon;

      h+=`<button onclick="startNode(${ni})" ${locked?"disabled":""} style="width:${sz}px;height:${sz}px;border-radius:50%;border:4px solid ${borderC};background:${bg};box-shadow:${shadow};opacity:${locked?0.3:1};display:flex;align-items:center;justify-content:center;position:relative">
        <span style="font-size:${avail?24:done?18:16}px">${icon}</span>
        ${avail&&!noWork?`<div style="position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);background:${isRev?"var(--blue)":"var(--g)"};color:#fff;font-size:7px;font-weight:800;padding:2px 7px;border-radius:7px">${isRev?"REVIEW":"START"}</div>`:""}
      </button>`;

      h+=`<div style="margin-top:6px;text-align:center;margin-bottom:4px">
        <div style="font-size:11px;font-weight:800;color:${locked?"#5a6a72":"var(--txt)"}">${node.name}</div>`;
      if(node.type==="learn"&&done){const b=node.unit*5;h+=`<div style="display:flex;gap:3px;justify-content:center;margin-top:2px">`;S.ws.slice(b,b+5).forEach(w=>{h+=`<div style="width:6px;height:6px;border-radius:3px;background:${rclr(recallP(w.h,today-w.lp))}"></div>`;});h+=`</div>`;}
      if(isRev&&hasWork)h+=`<div style="font-size:9px;color:var(--blue);font-weight:700">${getWeakWords(Math.floor(ni/2)).length} weak</div>`;
      if(isRev&&(done||noWork))h+=`<div style="font-size:9px;color:var(--g);font-weight:700">All strong</div>`;
      if(locked)h+=`<div style="font-size:9px;color:#5a6a72">\uD83D\uDD12 Complete above to unlock</div>`;
      h+=`</div>`;
    });
    h+=`</div>`;

    // Memory tracker (compact)
    const seen=S.ws.filter(w=>w.seen);
    if(seen.length>0){
      h+=`<div style="margin-top:20px;padding:10px 12px;background:var(--cb);border-radius:12px;border:1px solid var(--bc)"><div style="font-size:10px;font-weight:700;color:var(--g);margin-bottom:6px">Memory Tracker</div>`;
      seen.forEach(w=>{const p=recallP(w.h,today-w.lp);h+=`<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px"><span style="font-size:10px;font-weight:700;width:65px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ALL[w.i][0]}</span><div style="flex:1;height:6px;background:#1e3040;border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;width:${Math.round(p*100)}%;background:${rclr(p)}"></div></div><span style="font-size:8px;font-weight:700;color:${rclr(p)};width:24px;text-align:right">${Math.round(p*100)}%</span></div>`;});
      h+=`</div>`;
    }
    h+=`</div>`;

    // Bottom tab bar
    h+=`<div style="display:flex;border-top:1px solid var(--bc);flex-shrink:0;padding:8px 0 max(8px,env(safe-area-inset-bottom))">
      <button onclick="goPath()" style="flex:1;background:none;border:none;text-align:center;padding:6px 0">
        <div style="font-size:20px">\uD83C\uDFE0</div>
        <div style="font-size:9px;font-weight:700;color:var(--g)">Home</div>
      </button>
      <button onclick="showLeaderboard()" style="flex:1;background:none;border:none;text-align:center;padding:6px 0">
        <div style="font-size:20px">\uD83C\uDFC6</div>
        <div style="font-size:9px;font-weight:700;color:var(--sub)">Rankings</div>
      </button>
    </div>`;
    h+=`</div>`;
  }

  // ═══ LEADERBOARD ═══
  if(screen==="leaderboard"){
    h+=`<div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div style="padding:12px 18px;border-bottom:1px solid var(--bc);display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
        <button onclick="goPath()" style="background:none;border:none;color:var(--sub);font-size:16px">\u2190</button>
        <span style="font-size:18px;font-weight:900">\uD83C\uDFC6 Rankings</span>
        <button onclick="showLeaderboard()" style="background:none;border:none;color:var(--sub);font-size:14px">\u21BB</button>
      </div><div style="flex:1;overflow-y:auto;padding:12px 18px">`;
    if(!leaderboard.length)h+=`<div style="text-align:center;color:var(--dim);padding:40px 0">Loading...</div>`;
    else leaderboard.forEach((p,i)=>{
      const me=p.name===S.name,m=["\uD83E\uDD47","\uD83E\uDD48","\uD83E\uDD49"];
      h+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${me?"#1a3a2a":"var(--cb)"};border-radius:12px;margin-bottom:6px;border:${me?"2px solid var(--g)":"1px solid var(--bc)"}">
        <span style="font-size:${i<3?18:13}px;font-weight:900;width:28px;text-align:center">${i<3?m[i]:i+1}</span>
        <div style="flex:1"><div style="font-size:13px;font-weight:800;color:${me?"var(--g)":"var(--txt)"}">${p.name}${me?" (you)":""}</div><div style="font-size:10px;color:var(--dim)">${p.words||0} words \u00B7 \uD83D\uDD25${p.streak||0}d</div></div>
        <div style="text-align:right"><div style="font-size:15px;font-weight:900;color:var(--gold)">${p.xp||0}</div><div style="font-size:8px;color:var(--dim)">XP</div></div>
      </div>`;
    });
    h+=`</div>`;
    // Bottom tab
    h+=`<div style="display:flex;border-top:1px solid var(--bc);flex-shrink:0;padding:8px 0 max(8px,env(safe-area-inset-bottom))">
      <button onclick="goPath()" style="flex:1;background:none;border:none;text-align:center;padding:6px 0">
        <div style="font-size:20px">\uD83C\uDFE0</div>
        <div style="font-size:9px;font-weight:700;color:var(--sub)">Home</div>
      </button>
      <button onclick="showLeaderboard()" style="flex:1;background:none;border:none;text-align:center;padding:6px 0">
        <div style="font-size:20px">\uD83C\uDFC6</div>
        <div style="font-size:9px;font-weight:700;color:var(--g)">Rankings</div>
      </button>
    </div></div>`;
  }

  // ═══ LESSON ═══
  if(screen==="lesson"&&exs[exi]){
    const ex=exs[exi],word=ALL[ex.gi],isRev=PATH[curNode].type==="review",prog=((exi+1)/exs.length)*100;
    h+=`<div style="flex:1;display:flex;flex-direction:column;overflow:hidden">`;
    h+=`<div style="padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0">
      <button onclick="goPath()" style="background:none;border:none;color:var(--sub);font-size:20px;padding:4px 8px">\u2715</button>
      <div style="flex:1;height:12px;background:#2a3a42;border-radius:6px;overflow:hidden"><div style="height:100%;border-radius:6px;width:${prog}%;background:${isRev?"var(--blue)":"var(--g)"};transition:width 0.4s"></div></div>
      <div style="display:flex;gap:1px">${[0,1,2,3,4].map(i=>`<span style="font-size:14px;opacity:${i<hearts?1:0.15}">\u2764\uFE0F</span>`).join("")}</div>
    </div>`;
    if(isRev&&ex.type!=="intro"&&S.ws[ex.gi].seen){const p=recallP(S.ws[ex.gi].h,today-S.ws[ex.gi].lp);h+=`<div style="text-align:center;padding:0 16px 4px;font-size:11px;color:var(--dim)">Memory: <span style="font-weight:800;color:${rclr(p)}">${Math.round(p*100)}%</span></div>`;}
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow-y:auto">`;

    if(ex.type==="intro"){
      h+=`<div style="width:100%;text-align:center"><div style="font-size:13px;color:var(--sub);font-weight:700;margin-bottom:10px">New Word</div>
        <div style="background:var(--cb);border:2px solid var(--bc);border-radius:16px;padding:22px 18px;margin-bottom:14px">
          <div style="font-size:32px;font-weight:900;margin-bottom:2px">${word[0]}</div>
          <div style="font-size:12px;color:var(--g);font-weight:700;margin-bottom:12px">${word[1]}</div>
          <div style="font-size:16px;color:#c8e0e8;line-height:1.5;padding-top:12px;border-top:1px solid var(--bc)">${word[2]}</div>
          <div style="margin-top:12px;padding:8px 12px;background:#162228;border-radius:8px;border-left:3px solid var(--g)">
            <div style="font-size:8px;color:var(--g);font-weight:700;margin-bottom:2px">EXAMPLE</div>
            <div style="font-size:12px;color:#9ab8c4;font-style:italic">${word[3]}</div></div>
        </div><button class="btn btn-g" onclick="handleNext()">Got it</button></div>`;
    }
    if(ex.type==="pickDef"||ex.type==="pickWord"){
      const isDef=ex.type==="pickDef";
      h+=`<div style="width:100%;text-align:center"><div style="font-size:13px;color:var(--sub);font-weight:700;margin-bottom:10px">${isDef?"What does this word mean?":"Which word matches?"}</div>
        <div style="background:var(--cb);border:2px solid var(--bc);border-radius:16px;padding:20px 16px;margin-bottom:14px">
          ${isDef?`<div style="font-size:28px;font-weight:900">${word[0]}</div><div style="font-size:11px;color:var(--g);font-weight:700">${word[1]}</div>`:`<div style="font-size:15px;color:#c8e0e8;line-height:1.5">${word[2]}</div>`}
        </div><div style="display:flex;flex-direction:column;gap:7px">`;
      ex.opts.forEach(oi=>{
        let s=`padding:12px 14px;border:2px solid var(--bc);border-radius:12px;background:var(--cb);color:#c8e0e8;font-size:${isDef?"13":"16"}px;font-weight:${isDef?"600":"800"};text-align:left;width:100%;opacity:1`;
        if(picked!==null){if(oi===ex.gi)s=s.replace("var(--bc)","var(--g)").replace("var(--cb)","#1a3a1a").replace("#c8e0e8","var(--g)");else if(oi===picked)s=s.replace("var(--bc)","var(--red)").replace("var(--cb)","#3a1a1a").replace("#c8e0e8","var(--red)");else s+=";opacity:0.3";}
        h+=`<button style="${s}" onclick="handlePick(${oi})" ${picked!==null?"disabled":""}>${isDef?ALL[oi][2]:ALL[oi][0]}</button>`;
      });
      h+=`</div>`;
      if(picked!==null){
        h+=`<div style="margin-top:12px;width:100%">
          <div style="padding:10px 14px;border-radius:10px;margin-bottom:10px;background:${isOk?"#1a3a1a":"#3a1a1a"};border:1px solid ${isOk?"var(--g)":"var(--red)"}">
            <div style="font-size:14px;font-weight:800;color:${isOk?"var(--g)":"var(--red)"}">${isOk?"\u2705 Correct!":"\u274C Wrong"}</div>
            ${!isOk?`<div style="font-size:11px;color:var(--sub);margin-top:3px">${isDef?word[2]:word[0]+" \u2014 "+word[2]}</div>`:""}
          </div><button class="btn ${isOk?"btn-g":"btn-red"}" onclick="handleNext()">Continue</button></div>`;
      }
      h+=`</div>`;
    }
    h+=`</div></div>`;
  }

  // ═══ COMPLETE ═══
  if(screen==="complete"){
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
      <div style="font-size:56px;margin-bottom:10px">\uD83C\uDF89</div>
      <div style="font-size:22px;font-weight:900;margin-bottom:4px">${PATH[curNode].type==="review"?"Review Done!":"Lesson Done!"}</div>`;
    if(S.str>0)h+=`<div style="padding:6px 16px;background:linear-gradient(135deg,#3a2000,#2a1500);border-radius:12px;border:1px solid #5a3000;margin:10px 0;display:flex;align-items:center;gap:6px"><span style="font-size:24px">\uD83D\uDD25</span><span style="font-size:16px;font-weight:900;color:var(--fire)">${S.str}d streak!</span></div>`;
    h+=`<div style="display:flex;gap:20px;margin:16px 0">
      <div style="text-align:center"><div style="font-size:24px;font-weight:900;color:var(--gold)">${lc*10}</div><div style="font-size:9px;color:var(--sub)">XP</div></div>
      <div style="text-align:center"><div style="font-size:24px;font-weight:900;color:var(--g)">${lc}</div><div style="font-size:9px;color:var(--sub)">CORRECT</div></div>
      <div style="text-align:center"><div style="font-size:24px;font-weight:900;color:var(--red)">${lw}</div><div style="font-size:9px;color:var(--sub)">WRONG</div></div>
    </div>
    <button class="btn btn-g" onclick="goPath()">Continue</button>
    </div>`;
  }

  // ═══ FAIL ═══
  if(screen==="fail"){
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
      <div style="font-size:56px;margin-bottom:10px">\uD83D\uDC94</div>
      <div style="font-size:22px;font-weight:900;margin-bottom:4px;color:var(--red)">Out of Hearts!</div>
      <div style="font-size:12px;color:var(--sub);margin-bottom:14px">${lc} correct, ${lw} wrong</div>
      <div style="width:100%;margin-bottom:14px">`;
    [...new Set(missed)].forEach(gi=>{const w=S.ws[gi],p=recallP(w.h,today-w.lp);
      h+=`<div style="display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--cb);border-radius:8px;margin-bottom:3px;border:1px solid var(--bc)"><span style="font-weight:800;font-size:11px;width:65px">${ALL[gi][0]}</span><div style="flex:1;height:5px;background:#1e3040;border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;width:${Math.round(p*100)}%;background:${rclr(p)}"></div></div><span style="font-size:8px;font-weight:700;color:${rclr(p)}">${Math.round(p*100)}%</span></div>`;
    });
    h+=`</div><button class="btn btn-blue" onclick="startNode(${curNode})">Try Again</button><button class="btn btn-dark" onclick="goPath()">Back</button></div>`;
  }

  document.getElementById("app").innerHTML=h;
}

// ══════════ ACTIONS ══════════
window.submitName=async function(){const v=document.getElementById("ni").value.trim();if(!v)return;S.name=v;if(db)await loadCloud(v);saveAll();screen="path";render();};
window.goPath=function(){screen="path";render();};
window.startNode=function(ni){if(S.np[ni]===0)return;curNode=ni;if(PATH[ni].type==="learn")exs=buildLearn(PATH[ni].unit);else{exs=buildReview(ni);if(!exs.length){completeNode(ni);saveAll();screen="path";render();return;}}exi=0;hearts=5;picked=null;isOk=null;lc=0;lw=0;missed=[];screen="lesson";render();};
window.handlePick=function(o){if(picked!==null)return;const ex=exs[exi],ok=o===ex.gi;picked=o;isOk=ok;const w=S.ws[ex.gi];if(ok){w.nc++;lc++;S.xp+=10;}else{w.nw++;lw++;hearts--;missed.push(ex.gi);}w.h=calcHL(w.nc,w.nw,w.h);w.lp=today;w.seen=true;saveAll();render();};
window.handleNext=function(){if(hearts<=0&&!isOk){screen="fail";render();return;}if(exi+1>=exs.length){const u=[...new Set(missed)];if(u.length>0){const r=[];for(const gi of shuffle(u))r.push({type:Math.random()>0.5?"pickDef":"pickWord",gi,opts:makeOpts(gi)});exs=exs.concat(r);missed=[];exi++;picked=null;isOk=null;render();return;}S.gems+=5;const e=lc*10;if(S.ld<today){S.str=S.ld===today-1?S.str+1:(S.ld===0?1:1);S.ld=today;S.txp=e;}else S.txp+=e;completeNode(curNode);saveAll();screen="complete";render();}else{exi++;picked=null;isOk=null;render();}};
window.showLeaderboard=async function(){screen="leaderboard";render();await loadLeaderboard();render();};

// Init
(async()=>{if(S.name&&db){try{const d=await db.collection("users").doc(S.name).get();if(d.exists){const c=d.data();if(c.xp!=null&&c.xp>=S.xp)S=c;}}catch(e){}}saveLocal();render();})();
</script>
