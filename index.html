<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SAT Vocab">
<meta name="theme-color" content="#131F24">
<title>SAT Vocab Trainer</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%2358CC02' width='100' height='100' rx='22'/><text x='50' y='68' text-anchor='middle' font-size='52'>📚</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--g:#58CC02;--g2:#45A000;--bg:#131F24;--cb:#1B2B31;--bc:#2a4a52;--red:#FF4B4B;--blue:#1CB0F6;--gold:#ffd54f;--fire:#ff7043;--txt:#fff;--sub:#8BA4AE;--dim:#5a7a84}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--txt);max-width:480px;margin:0 auto;display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none;appearance:none}
.screen{flex:1;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* Header */
.hdr{padding:14px 18px;border-bottom:1px solid var(--bc);flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr-title{font-size:22px;font-weight:900;color:var(--g)}
.hdr-stats{display:flex;gap:6px}
.stat{display:flex;align-items:center;gap:3px;font-size:12px;font-weight:700;padding:4px 10px;border-radius:10px;background:var(--cb)}
.stat-fire{color:var(--fire)}.stat-xp{color:var(--gold)}.stat-gem{color:var(--blue)}
.goal-row{display:flex;justify-content:space-between;margin-bottom:3px}
.goal-lbl{font-size:11px;font-weight:700;color:var(--sub)}
.goal-bar{height:8px;background:#1e3040;border-radius:4px;overflow:hidden}
.goal-fill{height:100%;border-radius:4px;transition:width 0.5s}
.hdr-foot{margin-top:6px;display:flex;justify-content:space-between;font-size:11px}

/* Path */
.path-scroll{flex:1;overflow-y:auto;padding:20px 18px;-webkit-overflow-scrolling:touch}
.path-col{display:flex;flex-direction:column;align-items:center}
.path-line{width:4px;border-radius:2px;margin-bottom:4px}
.node{border-radius:50%;display:flex;align-items:center;justify-content:center;border:4px solid;position:relative;transition:transform 0.1s}
.node:active:not(:disabled){transform:scale(0.95)}
.node-badge{position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);color:#fff;font-size:7px;font-weight:800;padding:2px 7px;border-radius:7px;white-space:nowrap}
.node-info{margin-top:8px;text-align:center;margin-bottom:2px}
.node-name{font-size:11px;font-weight:800}
.dots{display:flex;gap:3px;justify-content:center;margin-top:3px}
.dot{width:7px;height:7px;border-radius:4px}
.node-sub{font-size:9px;font-weight:700;margin-top:2px}

/* Memory tracker */
.mem-panel{margin-top:24px;padding:12px 14px;background:var(--cb);border-radius:12px;border:1px solid var(--bc)}
.mem-title{font-size:11px;font-weight:700;color:var(--g);margin-bottom:8px}
.mem-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.mem-word{font-size:11px;font-weight:700;width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mem-bar{flex:1;height:7px;background:#1e3040;border-radius:4px;overflow:hidden}
.mem-fill{height:100%;border-radius:4px}
.mem-pct{font-size:9px;font-weight:700;width:28px;text-align:right}

/* Backup panel */
.backup{margin-top:16px;padding:10px 14px;background:#0d1a20;border-radius:10px;border:1px solid var(--bc)}
.backup-title{font-size:10px;font-weight:700;color:var(--dim);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.backup-btns{display:flex;gap:6px}
.backup-btn{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;border:1px solid var(--bc);background:var(--cb);color:var(--sub)}
.backup-msg{font-size:10px;color:var(--g);margin-top:4px;text-align:center}
.restore-input{width:100%;font-size:10px;padding:6px 8px;border-radius:6px;border:1px solid var(--bc);background:var(--cb);color:var(--txt);margin-top:4px;font-family:monospace}

/* Lesson top bar */
.les-top{padding:12px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.les-close{background:none;border:none;color:var(--sub);font-size:18px;padding:4px}
.les-bar{flex:1;height:14px;background:#2a3a42;border-radius:7px;overflow:hidden}
.les-fill{height:100%;border-radius:7px;transition:width 0.4s}
.hearts{display:flex;gap:2px}
.heart{font-size:15px}

/* Lesson content */
.les-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;overflow-y:auto}
.les-label{font-size:13px;color:var(--sub);font-weight:700;margin-bottom:12px}
.card{background:var(--cb);border:2px solid var(--bc);border-radius:18px;padding:24px 20px;width:100%;text-align:center;margin-bottom:16px}
.card-word{font-size:36px;font-weight:900;margin-bottom:4px}
.card-pos{font-size:13px;color:var(--g);font-weight:700;margin-bottom:14px}
.card-def{font-size:17px;color:#c8e0e8;line-height:1.5;padding-top:14px;border-top:1px solid var(--bc)}
.card-ex{margin-top:14px;padding:10px 14px;background:#162228;border-radius:10px;border-left:3px solid var(--g)}
.card-ex-lbl{font-size:9px;color:var(--g);font-weight:700;margin-bottom:3px}
.card-ex-txt{font-size:13px;color:#9ab8c4;font-style:italic}
.recall-info{text-align:center;padding:0 18px 4px;font-size:11px;color:var(--dim)}

/* Options */
.opts{display:flex;flex-direction:column;gap:8px;width:100%}
.opt{padding:13px 16px;border:2px solid var(--bc);border-radius:13px;background:var(--cb);color:#c8e0e8;font-size:14px;font-weight:600;text-align:left;width:100%;transition:all 0.15s}
.opt-word{font-size:17px;font-weight:800}
.opt-ok{background:#1a3a1a;border-color:var(--g);color:var(--g)}
.opt-no{background:#3a1a1a;border-color:var(--red);color:var(--red)}
.opt-dim{opacity:0.3}

/* Feedback */
.fb{margin-top:14px;width:100%}
.fb-box{padding:12px 16px;border-radius:12px;margin-bottom:12px;border:1px solid}
.fb-ok{background:#1a3a1a;border-color:var(--g)}
.fb-no{background:#3a1a1a;border-color:var(--red)}
.fb-title{font-size:15px;font-weight:800}
.fb-sub{font-size:12px;color:var(--sub);margin-top:4px}
.fb-hint{font-size:10px;color:var(--dim);margin-top:2px}

/* Big buttons */
.btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:800;color:#fff;text-transform:uppercase;margin-bottom:10px}
.btn-g{background:var(--g);box-shadow:0 4px 0 var(--g2)}
.btn-red{background:var(--red);box-shadow:0 4px 0 #cc3030}
.btn-blue{background:var(--blue);box-shadow:0 4px 0 #1390C8}
.btn-dark{background:var(--cb);color:var(--sub);box-shadow:0 4px 0 #0d1a20}
.btn:active{transform:translateY(2px);box-shadow:none}

/* Complete/Fail */
.end-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.end-emoji{font-size:64px;margin-bottom:12px}
.end-title{font-size:24px;font-weight:900;margin-bottom:4px}
.end-sub{font-size:14px;color:var(--sub);margin-bottom:6px}
.streak-box{padding:8px 20px;background:linear-gradient(135deg,#3a2000,#2a1500);border-radius:14px;border:1px solid #5a3000;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.streak-emoji{font-size:28px}
.streak-num{font-size:18px;font-weight:900;color:var(--fire)}
.streak-hint{font-size:10px;color:#aa7043}
.stats-row{display:flex;gap:20px;margin-bottom:20px}
.stat-box{text-align:center}
.stat-num{font-size:26px;font-weight:900}
.stat-lbl{font-size:9px;color:var(--sub)}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const UNITS=[
  {name:"Basics 1",words:[
    ["abase","v.","to humiliate, degrade","The leader was abased before his conqueror."],
    ["abate","v.","to reduce, lessen","The storm raged, then slowly abated."],
    ["abdicate","v.","to give up a position of leadership","The king abdicated his throne."],
    ["aberration","n.","something that differs from the norm","The warm day was an aberration."],
    ["abet","v.","to aid, help, encourage","A friend on the inside abetted the spy."]]},
  {name:"Basics 2",words:[
    ["abhor","v.","to hate, detest","She began to abhor the sport."],
    ["abject","adj.","wretched, pitiful","After losing everything, she was abject."],
    ["abjure","v.","to reject, renounce","He abjured the evil policies."],
    ["abridge","v.","to cut down, shorten","The publisher abridged the dictionary."],
    ["abrogate","v.","to abolish, usually by authority","They cannot abrogate our rights."]]},
  {name:"Intermediate",words:[
    ["abscond","v.","to sneak away and hide","The spy absconded into the night."],
    ["abstain","v.","to choose not to do something","He abstained from voting."],
    ["abstruse","adj.","hard to comprehend","John found geometry abstruse."],
    ["accede","v.","to agree","The teacher acceded to their request."],
    ["accentuate","v.","to stress, highlight","Happy people accentuate the positive."]]},
  {name:"Advanced",words:[
    ["acclaim","n.","high praise","Her poem won widespread acclaim."],
    ["accolade","n.","high praise, special distinction","He received accolades for his work."],
    ["acerbic","adj.","biting, bitter in tone","Her acerbic remarks hurt everyone."],
    ["acquiesce","v.","to agree without protesting","He acquiesced to her demands."],
    ["acrimony","n.","bitterness, discord","Acrimony overwhelmed their friendship."]]},
];
const ALL=UNITS.flatMap(u=>u.words);
const PATH=[
  {type:"learn",unit:0,icon:"\u2B50",name:"Basics 1"},
  {type:"review",icon:"\uD83D\uDD04",name:"Review 1"},
  {type:"learn",unit:1,icon:"\uD83D\uDCDA",name:"Basics 2"},
  {type:"review",icon:"\uD83D\uDD04",name:"Review 2"},
  {type:"learn",unit:2,icon:"\uD83D\uDD25",name:"Intermediate"},
  {type:"review",icon:"\uD83D\uDD04",name:"Review 3"},
  {type:"learn",unit:3,icon:"\uD83D\uDC8E",name:"Advanced"},
];

// ═══════════════════════════════════════════
// HLR Algorithm
// ═══════════════════════════════════════════
function calcHL(nc,nw,ph){return Math.max(0.25,Math.pow(2,0.7+0.9*Math.sqrt(nc)-0.7*Math.sqrt(nw)+0.35*Math.log2(ph+1)));}
function recallP(h,d){return h>0?Math.pow(2,-d/h):0;}
function todayNum(){return Math.floor(Date.now()/86400000);}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function makeOpts(gi){const d=[];const u=new Set([gi]);while(d.length<3){const r=0|Math.random()*ALL.length;if(!u.has(r)){u.add(r);d.push(r);}}return shuffle([gi,...d]);}
function rclr(v){return v>0.8?"#58CC02":v>0.5?"#ffd54f":"#FF4B4B";}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const SK="sat-vocab-pwa-v1";
let S={np:[1,0,0,0,0,0,0],ws:ALL.map((_,i)=>({i,nc:0,nw:0,h:0,lp:0,seen:false})),xp:0,str:0,gems:50,ld:0,txp:0};
let screen="path",curNode=0,exs=[],exi=0,hearts=5,picked=null,isOk=null,lc=0,lw=0,missed=[];
const dailyGoal=50;

function save(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}
function load(){try{const d=localStorage.getItem(SK);if(d){S=JSON.parse(d);return true;}}catch(e){}return false;}

// Init
const loaded=load();
const today=todayNum();
if(S.ld>0&&S.ld<today-1)S.str=0;
if(S.ld<today)S.txp=0;
save();

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function getWeakWords(upToUnit){
  const mx=(upToUnit+1)*5;
  return S.ws.filter((w,i)=>i<mx&&w.seen&&(w.nw>0||recallP(w.h,today-w.lp)<0.8));
}
function reviewHasWords(ni){return getWeakWords(Math.floor(ni/2)).length>0;}

function buildLearn(ui){
  const base=ui*5,e=[];
  for(let i=0;i<5;i++)e.push({type:"intro",gi:base+i});
  for(const i of shuffle([0,1,2,3,4]))e.push({type:"pickDef",gi:base+i,opts:makeOpts(base+i)});
  for(const i of shuffle([0,1,2,3,4]))e.push({type:"pickWord",gi:base+i,opts:makeOpts(base+i)});
  return e;
}
function buildReview(ni){
  const weak=getWeakWords(Math.floor(ni/2));if(!weak.length)return[];
  const batch=shuffle(weak).slice(0,10);const e=[];
  for(const w of shuffle(batch))e.push({type:"pickDef",gi:w.i,opts:makeOpts(w.i)});
  for(const w of shuffle(batch))e.push({type:"pickWord",gi:w.i,opts:makeOpts(w.i)});
  return e;
}
function completeNode(ni){
  S.np[ni]=2;if(ni+1<S.np.length&&S.np[ni+1]===0)S.np[ni+1]=1;save();
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render(){
  const isNewDay=S.ld<today;
  const goalPct=Math.min(100,((isNewDay?0:S.txp)/dailyGoal)*100);
  const goalMet=S.txp>=dailyGoal&&!isNewDay;
  const dateStr=new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  const seenCount=S.ws.filter(w=>w.seen).length;

  let html="";

  // ═══ PATH SCREEN ═══
  if(screen==="path"){
    html+=`<div class="screen active" style="overflow:hidden;display:flex;flex-direction:column">`;
    // Header
    html+=`<div class="hdr">
      <div class="hdr-top">
        <span class="hdr-title">SAT Vocab</span>
        <div class="hdr-stats">
          <div class="stat stat-fire">\uD83D\uDD25 ${S.str}</div>
          <div class="stat stat-xp">\u26A1 ${S.xp}</div>
          <div class="stat stat-gem">\uD83D\uDC8E ${S.gems}</div>
        </div>
      </div>
      <div>
        <div class="goal-row">
          <span class="goal-lbl">Daily Goal</span>
          <span class="goal-lbl" style="color:${goalMet?"var(--g)":"var(--sub)"}">${goalMet?"\u2705 Done!":(isNewDay?0:S.txp)+"/"+dailyGoal+" XP"}</span>
        </div>
        <div class="goal-bar"><div class="goal-fill" style="width:${goalPct}%;background:${goalMet?"linear-gradient(90deg,var(--g),#89E219)":"linear-gradient(90deg,var(--gold),#ffb74d)"}"></div></div>
      </div>
      <div class="hdr-foot">
        <span style="color:var(--dim)">${dateStr}</span>
        ${S.str>0?`<span style="color:var(--fire);font-weight:700">${S.str} day streak!</span>`:""}
        ${S.str===0&&S.ld>0?`<span style="color:var(--red);font-weight:700">Start a new streak!</span>`:""}
      </div>
    </div>`;

    // Path
    html+=`<div class="path-scroll"><div class="path-col">`;
    PATH.forEach((node,ni)=>{
      const st=S.np[ni],locked=st===0,done=st===2,avail=st===1;
      const isRev=node.type==="review";
      const hasWork=isRev&&avail&&reviewHasWords(ni);
      const noWork=isRev&&avail&&!reviewHasWords(ni);
      const sz=isRev?56:72;
      const iconSz=isRev?18:24;

      if(ni>0)html+=`<div class="path-line" style="height:${isRev?16:22}px;background:${done||avail||noWork?"var(--g)":"#2a3a42"}"></div>`;

      const borderC=(avail&&(!isRev||hasWork))?(isRev?"var(--blue)":"var(--g)"):done||noWork?"var(--g)":"#2a3a42";
      const bg=done||noWork?"var(--g)":avail?"var(--cb)":"#1a2530";
      const shadow=avail&&(!isRev||hasWork)?"0 5px 0 "+(isRev?"#1390C8":"var(--g2)"):done||noWork?"0 3px 0 var(--g2)":"0 3px 0 #1a2530";
      const icon=done||noWork?"\u2705":isRev&&hasWork?"\uD83D\uDD04":node.icon;

      html+=`<button class="node" onclick="startNode(${ni})" ${locked?"disabled":""} style="width:${sz}px;height:${sz}px;border-color:${borderC};background:${bg};box-shadow:${shadow};opacity:${locked?0.3:1}">
        <span style="font-size:${iconSz}px">${icon}</span>
        ${avail&&!noWork?`<div class="node-badge" style="background:${isRev?"var(--blue)":"var(--g)"}">${isRev?"REVIEW":"START"}</div>`:""}
      </button>`;

      html+=`<div class="node-info"><div class="node-name" style="color:${locked?"#5a6a72":"var(--txt)"}">${node.name}</div>`;

      if(node.type==="learn"&&done){
        const base=node.unit*5;
        html+=`<div class="dots">`;
        S.ws.slice(base,base+5).forEach(w=>{const p=recallP(w.h,today-w.lp);html+=`<div class="dot" style="background:${rclr(p)}"></div>`;});
        html+=`</div>`;
      }
      if(isRev&&hasWork){const wc=getWeakWords(Math.floor(ni/2)).length;html+=`<div class="node-sub" style="color:var(--blue)">${wc} weak</div>`;}
      if(isRev&&(done||noWork))html+=`<div class="node-sub" style="color:var(--g)">All strong</div>`;
      if(node.type==="learn"&&!done&&!locked)html+=`<div class="node-sub" style="color:var(--dim)">5 words</div>`;
      if(locked)html+=`<div class="node-sub" style="color:#5a6a72">\uD83D\uDD12</div>`;
      html+=`</div>`;
    });
    html+=`</div>`;

    // Memory tracker
    const seenWords=S.ws.filter(w=>w.seen);
    if(seenWords.length>0){
      html+=`<div class="mem-panel"><div class="mem-title">Memory Tracker</div>`;
      seenWords.forEach(w=>{
        const p=recallP(w.h,today-w.lp);
        html+=`<div class="mem-row">
          <span class="mem-word">${ALL[w.i][0]}</span>
          <div class="mem-bar"><div class="mem-fill" style="width:${Math.round(p*100)}%;background:${rclr(p)}"></div></div>
          <span class="mem-pct" style="color:${rclr(p)}">${Math.round(p*100)}%</span>
        </div>`;
      });
      html+=`</div>`;
    }

    // Backup
    html+=`<div class="backup">
      <div class="backup-title">
        <span>\uD83D\uDCBE Progress Backup</span>
        <div class="backup-btns">
          <button class="backup-btn" onclick="copyProgress()">Copy</button>
          <button class="backup-btn" onclick="showRestore()">Restore</button>
        </div>
      </div>
      <div id="backup-msg"></div>
      <div id="restore-box" style="display:none">
        <input class="restore-input" id="restore-input" placeholder="Paste save code here...">
        <button class="btn btn-blue" style="margin-top:6px;padding:10px;font-size:12px" onclick="restoreProgress()">Restore Progress</button>
      </div>
    </div>`;

    html+=`</div></div>`;
  }

  // ═══ LESSON SCREEN ═══
  if(screen==="lesson"&&exs[exi]){
    const ex=exs[exi];const word=ALL[ex.gi];
    const progress=exs.length>0?((exi+1)/exs.length)*100:0;
    const isRev=PATH[curNode].type==="review";

    html+=`<div class="screen active">`;
    // Top bar
    html+=`<div class="les-top">
      <button class="les-close" onclick="goPath()">\u2715</button>
      <div class="les-bar"><div class="les-fill" style="width:${progress}%;background:${isRev?"var(--blue)":"var(--g)"}"></div></div>
      <div class="hearts">${[0,1,2,3,4].map(i=>`<span class="heart" style="opacity:${i<hearts?1:0.15}">\u2764\uFE0F</span>`).join("")}</div>
    </div>`;

    // Recall info for review
    if(isRev&&ex.type!=="intro"&&S.ws[ex.gi].seen){
      const p=recallP(S.ws[ex.gi].h,today-S.ws[ex.gi].lp);
      html+=`<div class="recall-info">Memory: <span style="font-weight:800;color:${rclr(p)}">${Math.round(p*100)}%</span> \u00B7 h=${S.ws[ex.gi].h.toFixed(1)}d</div>`;
    }

    html+=`<div class="les-body">`;

    // INTRO
    if(ex.type==="intro"){
      html+=`<div style="width:100%;text-align:center">
        <div class="les-label">New Word</div>
        <div class="card">
          <div class="card-word">${word[0]}</div>
          <div class="card-pos">${word[1]}</div>
          <div class="card-def">${word[2]}</div>
          <div class="card-ex"><div class="card-ex-lbl">EXAMPLE</div><div class="card-ex-txt">${word[3]}</div></div>
        </div>
        <button class="btn btn-g" onclick="handleNext()">Got it</button>
      </div>`;
    }

    // PICK DEF
    if(ex.type==="pickDef"){
      html+=`<div style="width:100%;text-align:center">
        <div class="les-label">What does this word mean?</div>
        <div class="card">
          <div class="card-word" style="font-size:30px">${word[0]}</div>
          <div class="card-pos" style="margin-bottom:0">${word[1]}</div>
        </div>
        <div class="opts">`;
      ex.opts.forEach(oi=>{
        let cls="opt";
        if(picked!==null){
          if(oi===ex.gi)cls+=" opt-ok";
          else if(oi===picked)cls+=" opt-no";
          else cls+=" opt-dim";
        }
        html+=`<button class="${cls}" onclick="handlePick(${oi})" ${picked!==null?"disabled":""}>${ALL[oi][2]}</button>`;
      });
      html+=`</div>`;
      if(picked!==null){
        html+=`<div class="fb">
          <div class="fb-box ${isOk?"fb-ok":"fb-no"}">
            <div class="fb-title" style="color:${isOk?"var(--g)":"var(--red)"}">${isOk?"\u2705 Correct!":"\u274C Incorrect"}</div>
            ${!isOk?`<div class="fb-sub">Answer: ${word[2]}</div><div class="fb-hint">\u21BB This word will come back</div>`:""}
          </div>
          <button class="btn ${isOk?"btn-g":"btn-red"}" onclick="handleNext()">Continue</button>
        </div>`;
      }
      html+=`</div>`;
    }

    // PICK WORD
    if(ex.type==="pickWord"){
      html+=`<div style="width:100%;text-align:center">
        <div class="les-label">Which word matches this definition?</div>
        <div class="card">
          <div style="font-size:16px;color:#c8e0e8;line-height:1.5">${word[2]}</div>
        </div>
        <div class="opts">`;
      ex.opts.forEach(oi=>{
        let cls="opt opt-word";
        if(picked!==null){
          if(oi===ex.gi)cls+=" opt-ok";
          else if(oi===picked)cls+=" opt-no";
          else cls+=" opt-dim";
        }
        html+=`<button class="${cls}" onclick="handlePick(${oi})" ${picked!==null?"disabled":""}>${ALL[oi][0]}</button>`;
      });
      html+=`</div>`;
      if(picked!==null){
        html+=`<div class="fb">
          <div class="fb-box ${isOk?"fb-ok":"fb-no"}">
            <div class="fb-title" style="color:${isOk?"var(--g)":"var(--red)"}">${isOk?"\u2705 Correct!":"\u274C Incorrect"}</div>
            ${!isOk?`<div class="fb-sub">Answer: ${word[0]} \u2014 ${word[2]}</div><div class="fb-hint">\u21BB This word will come back</div>`:""}
          </div>
          <button class="btn ${isOk?"btn-g":"btn-red"}" onclick="handleNext()">Continue</button>
        </div>`;
      }
      html+=`</div>`;
    }

    html+=`</div></div>`;
  }

  // ═══ COMPLETE SCREEN ═══
  if(screen==="complete"){
    html+=`<div class="screen active"><div class="end-screen">
      <div class="end-emoji">\uD83C\uDF89</div>
      <div class="end-title">${PATH[curNode].type==="review"?"Review Complete!":"Lesson Complete!"}</div>
      <div class="end-sub">${PATH[curNode].name}</div>`;
    if(S.str>0){
      html+=`<div class="streak-box"><span class="streak-emoji">\uD83D\uDD25</span><div><div class="streak-num">${S.str} day streak!</div><div class="streak-hint">Come back tomorrow to keep it going</div></div></div>`;
    }
    html+=`<div class="stats-row">
      <div class="stat-box"><div class="stat-num" style="color:var(--gold)">${lc*10}</div><div class="stat-lbl">XP EARNED</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--g)">${lc}</div><div class="stat-lbl">CORRECT</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--red)">${lw}</div><div class="stat-lbl">MISTAKES</div></div>
    </div>`;
    // Daily goal
    html+=`<div style="width:100%;padding:12px 16px;background:var(--cb);border-radius:14px;border:1px solid var(--bc);margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:11px;font-weight:700;color:var(--sub)">Daily Goal</span>
        <span style="font-size:11px;font-weight:700;color:${S.txp>=dailyGoal?"var(--g)":"var(--gold)"}">${S.txp}/${dailyGoal} XP</span>
      </div>
      <div style="height:10px;background:#1e3040;border-radius:5px;overflow:hidden">
        <div style="height:100%;border-radius:5px;width:${Math.min(100,S.txp/dailyGoal*100)}%;background:${S.txp>=dailyGoal?"var(--g)":"var(--gold)"}"></div>
      </div>
    </div>`;
    html+=`<button class="btn btn-g" onclick="goPath()">Continue</button>
    </div></div>`;
  }

  // ═══ FAIL SCREEN ═══
  if(screen==="fail"){
    html+=`<div class="screen active"><div class="end-screen">
      <div class="end-emoji">\uD83D\uDC94</div>
      <div class="end-title" style="color:var(--red)">Out of Hearts!</div>
      <div class="end-sub">${lc} correct, ${lw} wrong</div>
      <div style="width:100%;margin:16px 0">
        <div style="font-size:11px;font-weight:700;color:var(--sub);margin-bottom:6px;text-align:left">WORDS TO WORK ON:</div>`;
    [...new Set(missed)].forEach(gi=>{
      const w=S.ws[gi];const p=recallP(w.h,today-w.lp);
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--cb);border-radius:10px;margin-bottom:4px;border:1px solid var(--bc)">
        <span style="font-weight:800;font-size:13px;width:80px">${ALL[gi][0]}</span>
        <div style="flex:1;height:6px;background:#1e3040;border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;width:${Math.round(p*100)}%;background:${rclr(p)}"></div></div>
        <span style="font-size:9px;font-weight:700;color:${rclr(p)}">${Math.round(p*100)}%</span>
      </div>`;
    });
    html+=`</div>
      <button class="btn btn-blue" onclick="startNode(${curNode})">Try Again</button>
      <button class="btn btn-dark" onclick="goPath()">Back to Path</button>
    </div></div>`;
  }

  document.getElementById("app").innerHTML=html;
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
window.goPath=function(){screen="path";render();};

window.startNode=function(ni){
  if(S.np[ni]===0)return;
  curNode=ni;
  if(PATH[ni].type==="learn"){exs=buildLearn(PATH[ni].unit);}
  else{exs=buildReview(ni);if(!exs.length){completeNode(ni);screen="path";render();return;}}
  exi=0;hearts=5;picked=null;isOk=null;lc=0;lw=0;missed=[];
  screen="lesson";render();
};

window.handlePick=function(optIdx){
  if(picked!==null)return;
  const ex=exs[exi];const correct=optIdx===ex.gi;
  picked=optIdx;isOk=correct;
  const w=S.ws[ex.gi];
  if(correct){w.nc++;lc++;S.xp+=10;}
  else{w.nw++;lw++;hearts--;missed.push(ex.gi);}
  w.h=calcHL(w.nc,w.nw,w.h);w.lp=today;w.seen=true;
  save();render();
};

window.handleNext=function(){
  if(hearts<=0&&!isOk){screen="fail";render();return;}
  const next=exi+1;
  if(next>=exs.length){
    const uniq=[...new Set(missed)];
    if(uniq.length>0){
      const retry=[];
      for(const gi of shuffle(uniq))retry.push({type:Math.random()>0.5?"pickDef":"pickWord",gi,opts:makeOpts(gi)});
      exs=exs.concat(retry);missed=[];
      exi=next;picked=null;isOk=null;render();return;
    }
    // Complete
    S.gems+=5;
    const earnedXp=lc*10;
    if(S.ld<today){S.str=S.ld===today-1?S.str+1:(S.ld===0?1:1);S.ld=today;S.txp=earnedXp;}
    else{S.txp+=earnedXp;}
    completeNode(curNode);
    screen="complete";render();
  }else{exi=next;picked=null;isOk=null;render();}
};

window.copyProgress=function(){
  const code=btoa(JSON.stringify(S));
  navigator.clipboard.writeText(code).then(()=>{
    document.getElementById("backup-msg").innerHTML=`<div class="backup-msg">\u2705 Copied! Save this code somewhere safe.</div>`;
  }).catch(()=>{
    // Fallback
    const ta=document.createElement("textarea");ta.value=code;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    document.getElementById("backup-msg").innerHTML=`<div class="backup-msg">\u2705 Copied!</div>`;
  });
};

window.showRestore=function(){
  const box=document.getElementById("restore-box");
  box.style.display=box.style.display==="none"?"block":"none";
};

window.restoreProgress=function(){
  const code=document.getElementById("restore-input").value.trim();
  if(!code)return;
  try{
    const d=JSON.parse(atob(code));
    S=d;save();
    document.getElementById("backup-msg").innerHTML=`<div class="backup-msg">\u2705 Restored! Reloading...</div>`;
    setTimeout(()=>{render();},500);
  }catch(e){
    document.getElementById("backup-msg").innerHTML=`<div class="backup-msg" style="color:var(--red)">\u274C Invalid code</div>`;
  }
};

// Initial render
render();
</script>
</body>
</html>
